<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>汉语 · ระบบทบทวนภาษาจีน</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;700&family=Noto+Sans+SC:wght@300;400;500&family=Noto+Sans+Thai:wght@300;400;500;600&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/hanzi-writer/3.5.1/hanzi-writer.min.js"></script>
<style>
:root{
  --ink:#1c1814;--paper:#f7f3ec;--p2:#ede8df;--p3:#e2dbd1;
  --red:#c0392b;--red2:#e74c3c;--gold:#b8860b;--gold2:#d4a017;
  --green:#27ae60;--blue:#2471a3;--orange:#e67e22;
  --muted:#8a7d70;--line:rgba(0,0,0,0.10);
  --sh:0 2px 10px rgba(0,0,0,0.08);--sh2:0 4px 24px rgba(0,0,0,0.13);
  --r:12px;--r2:8px;
  --zh:"PingFang SC","Microsoft YaHei","Heiti SC",sans-serif;
  --ui:"Noto Sans Thai","Noto Sans SC",sans-serif;
  --en:"Lora",serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--ui);background:var(--paper);color:var(--ink);-webkit-tap-highlight-color:transparent;}
button{cursor:pointer;font-family:inherit;border:none;}

.app{display:flex;flex-direction:column;height:100vh;overflow:hidden;}

/* NAV */
.nav{background:var(--ink);color:white;height:52px;padding:0 16px;
  display:flex;align-items:center;gap:12px;flex-shrink:0;
  box-shadow:0 2px 12px rgba(0,0,0,.4);z-index:200;}
.nav-brand{font-family:var(--zh);font-size:1.1rem;letter-spacing:.04em;white-space:nowrap;}
.nav-tabs{display:flex;gap:2px;margin-left:auto;overflow-x:auto;scrollbar-width:none;}
.nav-tabs::-webkit-scrollbar{display:none;}
.ntab{padding:6px 12px;border-radius:16px;background:transparent;color:rgba(255,255,255,.5);
  font-size:.75rem;font-weight:600;white-space:nowrap;transition:all .2s;}
.ntab:hover{color:white;background:rgba(255,255,255,.1);}
.ntab.on{color:white;background:var(--red);}

.wrap{display:flex;flex:1;overflow:hidden;}

/* SIDEBAR */
.sb{width:200px;min-width:200px;background:var(--p2);border-right:1px solid var(--line);
  overflow-y:auto;height:100%;padding:8px 0 24px;}
.sb-bk{font-size:.6rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--muted);padding:10px 14px 4px;display:flex;align-items:center;gap:5px;}
.sb-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.sbi{display:flex;align-items:center;gap:8px;padding:6px 12px;cursor:pointer;
  border-left:3px solid transparent;transition:all .15s;
  border-radius:0 6px 6px 0;margin-right:6px;}
.sbi:hover{background:rgba(0,0,0,.05);}
.sbi.on{background:rgba(192,57,43,.09);border-left-color:var(--red);}
.sbi-n{font-family:var(--zh);font-size:.95rem;font-weight:700;color:var(--muted);min-width:22px;}
.sbi.on .sbi-n{color:var(--red);}
.sbi-t{flex:1;min-width:0;}
.sbi-zh{font-family:var(--zh);font-size:.8rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sbi-en{font-size:.6rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sbi-c{font-size:.58rem;padding:1px 4px;border-radius:6px;background:var(--p3);color:var(--muted);font-weight:700;flex-shrink:0;}

/* MAIN */
.main{flex:1;overflow-y:auto;height:100%;}
.view{display:none;}
.view.on{display:block;}

/* ── LESSON ── */
.lw{padding:24px 28px;max-width:860px;}
.lh{display:flex;align-items:flex-start;gap:16px;margin-bottom:24px;
  padding-bottom:18px;border-bottom:1px solid var(--line);}
.lh-c{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-family:var(--zh);font-size:1.4rem;font-weight:700;
  color:white;flex-shrink:0;box-shadow:0 3px 14px rgba(0,0,0,.2);}
.lh-zh{font-family:var(--zh);font-size:1.6rem;font-weight:700;line-height:1.2;}
.lh-en{font-family:var(--en);font-style:italic;color:var(--muted);margin-top:2px;font-size:.88rem;}
.lh-btns{margin-left:auto;display:flex;gap:7px;flex-wrap:wrap;justify-content:flex-end;}
.btn{padding:7px 15px;border-radius:20px;font-size:.75rem;font-weight:600;transition:all .2s;}
.btn-r{background:var(--red);color:white;}.btn-r:hover{background:var(--red2);}
.btn-g{background:var(--gold);color:white;}.btn-g:hover{background:var(--gold2);}
.btn-p{background:#444;color:white;}.btn-p:hover{background:#222;}
.btn-o{background:var(--p3);color:var(--ink);}.btn-o:hover{background:var(--p2);}

.sec{display:flex;align-items:center;gap:8px;font-size:.72rem;font-weight:700;
  letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin:20px 0 10px;}
.sec::after{content:'';flex:1;height:1px;background:var(--line);}

/* DIALOGUE */
.dlg{background:white;border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;}
.dl{display:grid;grid-template-columns:34px 1fr;gap:10px;padding:10px 14px;
  border-bottom:1px solid rgba(0,0,0,.04);transition:background .12s;}
.dl:last-child{border-bottom:none;}
.dl:hover{background:#fffbf8;}
.dl-sp{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-weight:700;font-size:.65rem;color:white;
  flex-shrink:0;margin-top:2px;}
.dl-zh{font-family:var(--zh);font-size:1rem;font-weight:500;line-height:1.5;}
.dl-py{font-size:.72rem;color:var(--gold2);margin-top:1px;}
.dl-th{font-size:.78rem;color:var(--blue);margin-top:2px;}

/* KEY SENTENCES */
.ks{background:linear-gradient(135deg,#fff9f6,#fff4ef);
  border:1px solid rgba(192,57,43,.13);border-left:4px solid var(--red);
  border-radius:0 var(--r2) var(--r2) 0;padding:9px 13px;
  font-size:.85rem;line-height:1.6;margin-bottom:6px;}

/* GRAMMAR */
.gc{background:white;border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;margin-bottom:10px;}
.gc-h{background:linear-gradient(135deg,#1a1410,#3a3025);color:white;
  padding:9px 14px;display:flex;align-items:center;gap:8px;}
.gc-tag{font-size:.6rem;padding:2px 6px;border-radius:7px;background:rgba(255,255,255,.2);font-weight:700;}
.gc-ttl{font-family:var(--zh);font-size:.88rem;font-weight:500;}
.gc-b{padding:11px 14px;}
.gc-pat{font-family:var(--zh);font-size:.95rem;color:var(--red);font-weight:700;
  background:rgba(192,57,43,.07);padding:5px 10px;border-radius:6px;
  display:inline-block;margin-bottom:7px;}
.gc-exp{font-size:.78rem;color:var(--ink);line-height:1.6;margin-bottom:7px;}
.gc-ex{font-size:.78rem;background:var(--p2);border-radius:6px;padding:7px 11px;line-height:1.7;}
.gc-ex-zh{font-family:var(--zh);font-weight:500;}
.gc-ex-py{color:var(--gold2);font-size:.72rem;margin-bottom:1px;}
.gc-ex-th{color:var(--blue);font-size:.75rem;}

/* VOCAB TABLE */
.vt-w{background:white;border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;}
.vt{width:100%;border-collapse:collapse;}
.vt th{background:var(--ink);color:white;padding:7px 11px;font-size:.65rem;
  text-align:left;font-weight:600;letter-spacing:.06em;}
.vt tr:nth-child(even){background:var(--paper);}
.vt tr:hover{background:#fff5f0;}
.vt td{padding:8px 11px;border-bottom:1px solid var(--line);font-size:.82rem;vertical-align:middle;}
.vt-zh{font-family:var(--zh);font-size:1.1rem;font-weight:500;}
.vt-py{color:var(--red);font-size:.75rem;}
.vt-type{font-size:.6rem;padding:1px 5px;border-radius:4px;background:var(--p3);color:var(--muted);}
.vt-th{color:var(--blue);font-weight:500;}
.stroke-btn{padding:3px 8px;border-radius:10px;font-size:.65rem;font-weight:600;
  background:var(--p3);color:var(--muted);transition:all .15s;}
.stroke-btn:hover{background:var(--orange);color:white;}

/* ── FLASHCARD ── */
.fcv{display:flex;flex-direction:column;align-items:center;padding:24px 16px;
  min-height:100%;gap:16px;}
.fc-top{text-align:center;max-width:500px;width:100%;}
.fc-name{font-family:var(--zh);font-size:1rem;font-weight:500;margin-bottom:8px;}
.fc-modes{display:flex;gap:5px;justify-content:center;margin-bottom:10px;flex-wrap:wrap;}
.fcm{padding:4px 12px;border-radius:12px;border:1.5px solid var(--line);
  background:white;font-size:.72rem;font-weight:600;color:var(--muted);transition:all .15s;}
.fcm.on{background:var(--red);color:white;border-color:var(--red);}
.fc-dots{display:flex;gap:3px;justify-content:center;flex-wrap:wrap;margin-bottom:4px;}
.fcd{width:8px;height:8px;border-radius:50%;background:var(--p3);
  border:1px solid var(--line);cursor:pointer;transition:background .2s;}
.fcd.seen{background:var(--gold);}
.fcd.cur{background:var(--red);transform:scale(1.3);}

.fc-wrap{width:100%;max-width:480px;}
.fc-card{width:100%;min-height:270px;border-radius:var(--r);
  box-shadow:0 8px 32px rgba(0,0,0,.14);cursor:pointer;
  user-select:none;-webkit-user-select:none;
  position:relative;transition:transform .1s ease;}
.fc-card:active{transform:scale(.98);}

/* ── CRITICAL FIX: use visibility/position not display:none on inner faces ── */
.fc-front,.fc-back{
  width:100%;padding:36px 28px;
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;text-align:center;min-height:270px;
  border-radius:var(--r);
}
.fc-back{display:none;}
.fc-card.flipped .fc-front{display:none;}
.fc-card.flipped .fc-back{display:flex;background:var(--ink);}
.fc-front{background:white;}

.fc-big{font-family:var(--zh);font-size:5rem;line-height:1;font-weight:700;color:var(--ink);}
.fc-hint{margin-top:18px;font-size:.75rem;color:var(--muted);display:flex;align-items:center;gap:5px;}
.fc-hint::before{content:"👆";}
.fc-py{font-size:1.3rem;color:var(--gold2);font-weight:500;margin-bottom:5px;}
.fc-typ{font-size:.65rem;padding:2px 7px;border-radius:9px;
  background:rgba(255,255,255,.15);color:rgba(255,255,255,.7);margin-bottom:12px;}
.fc-en{font-family:var(--en);font-size:1rem;color:rgba(255,255,255,.9);margin-bottom:8px;}
.fc-th{font-size:1.1rem;color:var(--gold2);font-weight:600;}

.fc-ctrl{display:flex;gap:10px;align-items:center;}
.fcb{padding:9px 22px;border-radius:26px;font-size:.85rem;font-weight:700;transition:all .2s;}
.fcb-prev{background:var(--p3);color:var(--ink);}
.fcb-prev:hover{background:var(--p2);}
.fcb-next{background:var(--red);color:white;box-shadow:0 3px 14px rgba(192,57,43,.35);}
.fcb-next:hover{background:var(--red2);transform:translateY(-1px);}
.fc-cnt{color:var(--muted);font-size:.82rem;min-width:52px;text-align:center;}
.fc-kbd{font-size:.68rem;color:var(--muted);}
.kbd{display:inline-block;padding:1px 5px;background:var(--p3);border-radius:4px;
  font-size:.65rem;border:1px solid var(--line);}

/* ── QUIZ ── */
.qw{padding:24px 28px;max-width:700px;}
.qh-ti{font-family:var(--zh);font-size:1.3rem;font-weight:700;}
.qh-su{color:var(--muted);font-size:.8rem;margin-top:3px;}
.qmodes{display:flex;gap:7px;margin-top:12px;flex-wrap:wrap;}
.qmode{padding:6px 16px;border-radius:18px;border:2px solid var(--line);
  background:white;font-size:.76rem;font-weight:600;color:var(--muted);transition:all .15s;}
.qmode.on{border-color:var(--red);color:var(--red);background:rgba(192,57,43,.05);}
.qstat{display:flex;gap:14px;background:var(--p2);border-radius:var(--r2);
  padding:9px 14px;margin-bottom:14px;font-size:.78rem;}
.qsc{font-weight:700;color:var(--green);}
.qcard{background:white;border-radius:var(--r);box-shadow:var(--sh2);padding:24px 20px;margin-bottom:14px;}
.q-zh{font-family:var(--zh);font-size:2.2rem;text-align:center;margin-bottom:5px;}
.q-py{text-align:center;font-size:.85rem;color:var(--gold);margin-bottom:18px;}
.q-opts{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.qopt{padding:11px 14px;border-radius:var(--r2);border:2px solid var(--line);
  background:white;font-size:.85rem;text-align:center;transition:all .2s;cursor:pointer;}
.qopt:hover{border-color:var(--red);color:var(--red);}
.qopt.ok{background:rgba(39,174,96,.1);border-color:var(--green);color:var(--green);}
.qopt.bad{background:rgba(192,57,43,.1);border-color:var(--red);color:var(--red);}
.qres{text-align:center;margin-top:12px;font-size:.88rem;font-weight:600;
  padding:9px;border-radius:var(--r2);}
.qres.ok{background:rgba(39,174,96,.1);color:var(--green);}
.qres.bad{background:rgba(192,57,43,.1);color:var(--red);}
.q-fill{width:100%;padding:11px 14px;border-radius:var(--r2);
  border:2px solid var(--line);font-family:var(--zh);
  font-size:1.2rem;text-align:center;outline:none;transition:border .2s;}
.q-fill:focus{border-color:var(--red);}
.qbtn{width:100%;padding:11px;border-radius:var(--r2);
  background:var(--red);color:white;font-size:.88rem;font-weight:700;
  margin-top:10px;transition:all .2s;}
.qbtn.blue{background:var(--blue);}
.qbtn:hover{opacity:.9;}

/* ── GRAMMAR VIEW ── */
.gv{padding:24px 28px;max-width:1000px;}
.gv-ti{font-family:var(--zh);font-size:1.4rem;font-weight:700;}
.gv-su{color:var(--muted);font-size:.8rem;margin-top:3px;}
.gbsec{margin-bottom:28px;}
.gblabel{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.gbtag{padding:4px 12px;border-radius:16px;font-size:.72rem;font-weight:700;color:white;}
.ggrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:9px;}
.gm{background:white;border-radius:var(--r2);box-shadow:var(--sh);overflow:hidden;}
.gm-h{background:var(--ink);color:white;padding:7px 12px;font-size:.75rem;font-weight:700;}
.gm-b{padding:9px 12px;}
.gm-pat{font-family:var(--zh);font-size:.9rem;color:var(--red);font-weight:500;margin-bottom:3px;}
.gm-ex{font-size:.72rem;color:var(--muted);line-height:1.5;}
.gm-ex strong{color:var(--ink);font-family:var(--zh);}
.glg-h{font-size:.7rem;color:var(--muted);font-weight:700;margin-bottom:7px;
  display:flex;align-items:center;gap:7px;}
.glg-h::after{content:'';flex:1;height:1px;background:var(--line);}
.glg-grp{margin-bottom:18px;}

/* ── INDEX ── */
.iv{padding:24px 28px;}
.iv-ti{font-family:var(--zh);font-size:1.4rem;font-weight:700;}
.iv-su{color:var(--muted);font-size:.8rem;margin-top:3px;}
.ibar{display:flex;gap:8px;margin:14px 0 18px;align-items:center;flex-wrap:wrap;}
.iinput{flex:1;min-width:180px;padding:9px 14px;border:1.5px solid var(--line);
  border-radius:var(--r2);font-family:inherit;font-size:.88rem;outline:none;
  background:white;transition:border .2s;}
.iinput:focus{border-color:var(--red);}
.ifilters{display:flex;gap:5px;}
.idf{padding:5px 11px;border-radius:14px;border:1.5px solid var(--line);
  background:white;font-size:.7rem;font-weight:600;color:var(--muted);transition:all .15s;}
.idf.on{background:var(--red);color:white;border-color:var(--red);}
.igrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:5px;}
.ie{background:white;border-radius:var(--r2);padding:9px 12px;
  display:flex;align-items:center;gap:9px;box-shadow:var(--sh);
  cursor:pointer;transition:all .15s;border:1px solid transparent;}
.ie:hover{border-color:var(--red);box-shadow:var(--sh2);}
.ie-zh{font-family:var(--zh);font-size:1.1rem;font-weight:500;min-width:36px;}
.ie-info{flex:1;min-width:0;}
.ie-py{font-size:.68rem;color:var(--red);}
.ie-th{font-size:.68rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ie-tag{font-size:.58rem;padding:2px 6px;border-radius:7px;color:white;font-weight:700;white-space:nowrap;flex-shrink:0;}

/* ── STROKE MODAL ── */
.smodal{position:fixed;inset:0;background:rgba(0,0,0,.6);
  display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;}
.sbox{background:white;border-radius:16px;padding:20px;max-width:340px;width:100%;
  box-shadow:0 20px 60px rgba(0,0,0,.3);}
.sm-hd{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.sm-char{font-family:var(--zh);font-size:2.2rem;font-weight:700;}
.sm-info{flex:1;}
.sm-py{color:var(--gold2);font-size:.95rem;}
.sm-th{color:var(--blue);font-size:.8rem;margin-top:2px;}
.sm-x{width:30px;height:30px;border-radius:50%;background:var(--p3);
  display:flex;align-items:center;justify-content:center;font-size:1.1rem;cursor:pointer;}
.sm-x:hover{background:var(--p2);}
.sm-cw{display:flex;justify-content:center;margin-bottom:14px;}
#sm-svg{border:2px solid var(--line);border-radius:8px;background:#fffdf9;}
.sm-btns{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;}
.smbtn{padding:8px 14px;border-radius:18px;font-size:.78rem;font-weight:600;transition:all .2s;}
.smbtn-a{background:var(--red);color:white;}.smbtn-a:hover{background:var(--red2);}
.smbtn-q{background:var(--blue);color:white;}
.smbtn-r{background:var(--green);color:white;}
.smbtn-c{background:var(--p3);color:var(--ink);}
.sm-msg{text-align:center;font-size:.75rem;color:var(--muted);margin-top:8px;min-height:18px;}

/* ── MOBILE SIDEBAR ── */
.sb-overlay{display:none;position:fixed;background:rgba(0,0,0,.45);z-index:250;
  opacity:0;transition:opacity .25s;pointer-events:none;
  left:0;right:0;bottom:0;top:52px;}
.sb-overlay.open{opacity:1;pointer-events:auto;}
.menu-btn{display:none;width:38px;height:38px;border-radius:9px;background:rgba(255,255,255,.12);
  color:white;font-size:1.25rem;align-items:center;justify-content:center;
  flex-shrink:0;transition:background .15s;}
.menu-btn:hover{background:rgba(255,255,255,.22);}

@media(max-width:700px){
  .menu-btn{display:flex;}
  .sb{
    position:fixed;left:0;top:52px;height:calc(100% - 52px);z-index:260;
    transform:translateX(-105%);transition:transform .27s cubic-bezier(.4,0,.2,1);
    box-shadow:4px 0 24px rgba(0,0,0,.22);
    display:block!important;
    width:240px;min-width:240px;
    overflow-y:auto;
  }
  .sb.open{transform:translateX(0);}
  .sb-overlay{display:block;}
}

/* ── PRINT ── */
.psheet{display:none;}
@media print{
  .nav,.sb,.lh-btns,.stroke-btn,.lh-btns *{display:none!important;}
  body,html{background:white!important;height:auto!important;overflow:visible!important;}
  .app,.wrap,.main{display:block!important;height:auto!important;overflow:visible!important;}
  .view{display:none!important;}
  .psheet{display:block!important;}
  .ps-lesson{page-break-after:always;}
  .ps-lesson:last-child{page-break-after:auto;}
  .ps-hdr{padding:8px 14px;display:flex;justify-content:space-between;align-items:center;
    margin-bottom:10px;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .ps-h-zh{font-family:var(--zh);font-size:13pt;font-weight:700;color:white;}
  .ps-h-info{font-size:7.5pt;color:rgba(255,255,255,.85);text-align:right;}
  .ps-instr{font-size:7pt;color:#666;margin-bottom:8px;padding:0 14px;}
  .ps-word{padding:0 14px 6px;break-inside:avoid;page-break-inside:avoid;}
  .ps-divider{height:0.5pt;background:#ddd;margin:5pt 14px;}
  .ps-meta{font-size:7.5pt;margin-bottom:3pt;display:flex;gap:7pt;align-items:baseline;flex-wrap:wrap;}
  .ps-zh{font-family:var(--zh);font-size:11pt;font-weight:700;}
  .ps-py{color:#b01010;}
  .ps-th{color:#1a5276;}
  .ps-en{color:#555;}
  /* TWO ROWS per word */
  .ps-grid{display:flex;margin-bottom:2pt;}
  .psc{width:28pt;height:28pt;border:0.4pt solid #aaa;flex-shrink:0;position:relative;}
  /* Guide lines inside cell */
  .psc::before{content:"";position:absolute;inset:0;

ou tomorrow!","th":"แล้วพบกันพรุ่งนี้!"},{"speaker":"B","zh":"明天见！","py":"Míngtiān jiàn!","en":"See you tomorrow!","th":"แล้วพบกันพรุ่งนี้!"}],"grammar":[{"rule":"动词谓语句","zh":"S + V (+ O)","en":"Verb predicate sentence","example":"我去银行。= I go to the bank.","th":"ประโยคที่กริยาเป็นภาคแสดง"},{"rule":"省略主语","zh":"Context allows subject omission","en":"Subject can be omitted when context is clear","example":"(我)去银行。","th":"ละประธานได้เมื่อบริบทชัดเจน"}],"key_sentences":["明天见 = แล้วพบกัน (ลา)","对 = ถูกต้อง (ยืนยัน)"],"vocab":[{"zh":"学","py":"xué","type":"动","en":"to study; to learn","th":"เรียน"},{"zh":"英语","py":"Yīngyǔ","type":"名","en":"English","th":"ภาษาอังกฤษ"},{"zh":"去","py":"qù","type":"动","en":"to go","th":"ไป"},{"zh":"对","py":"duì","type":"形","en":"correct; right","th":"ถูก"},{"zh":"邮局","py":"yóujú","type":"名","en":"post office","th":"ที่ทำการไปรษณีย์"},{"zh":"寄","py":"jì","type":"动","en":"to mail","th":"ส่งจดหมาย"},{"zh":"信","py":"xìn","type":"名","en":"letter","th":"จดหมาย"},{"zh":"银行","py":"yínháng","type":"名","en":"bank","th":"ธนาคาร"},{"zh":"取","py":"qǔ","type":"动","en":"to withdraw","th":"ถอน"},{"zh":"钱","py":"qián","type":"名","en":"money","th":"เงิน"},{"zh":"明天","py":"míngtiān","type":"名","en":"tomorrow","th":"พรุ่งนี้"},{"zh":"见","py":"jiàn","type":"动","en":"to see","th":"พบ"},{"zh":"六","py":"liù","type":"数","en":"six","th":"หก"},{"zh":"七","py":"qī","type":"数","en":"seven","th":"เจ็ด"},{"zh":"九","py":"jiǔ","type":"数","en":"nine","th":"เก้า"}],"exercises":[{"type":"translate","q":"See you tomorrow! (จีน)","a":"明天见！"},{"type":"fill","q":"你___什么？(เรียน)","a":"学"},{"type":"match","q":"银行","a":"ธนาคาร"}]},"4":{"title":"你去哪儿","title_en":"Where are you going","dialogue":[{"speaker":"A","zh":"今天星期几？","py":"Jīntiān xīngqī jǐ?","en":"What day is today?","th":"วันนี้วันอะไร?"},{"speaker":"B","zh":"今天星期二。","py":"Jīntiān Xīngqī'èr.","en":"Today is Tuesday.","th":"วันนี้วันอังคาร"},{"speaker":"A","zh":"你去哪儿？","py":"Nǐ qù nǎr?","en":"Where are you going?","th":"คุณจะไปไหน?"},{"speaker":"B","zh":"我去天安门，你去不去？","py":"Wǒ qù Tiān'ānMén, nǐ qù bu qù?","en":"I'm going to Tian'anmen, are you going?","th":"ฉันไปเทียนอันเหมิน คุณไปด้วยไหม?"},{"speaker":"A","zh":"不去，我回学校。","py":"Bú qù, wǒ huí xuéxiào.","en":"No, I'm going back to school.","th":"ไม่ไป ฉันกลับโรงเรียน"},{"speaker":"B","zh":"再见！","py":"Zàijiàn!","en":"Goodbye!","th":"ลาก่อน!"}],"grammar":[{"rule":"正反问句","zh":"V + 不 + V？","en":"Affirmative-negative question","example":"你去不去？= Are you going or not?","th":"คำถามยืนยัน-ปฏิเสธ"},{"rule":"星期说法","zh":"星期 + 数字","en":"Days of the week","example":"星期一=Mon, 星期二=Tue, 星期天=Sun","th":"วันในสัปดาห์"},{"rule":"哪儿/那儿","zh":"哪儿 = where? / 那儿 = there","en":"Question vs demonstrative pronoun","example":"你去哪儿？我去那儿。","th":"哪儿=ที่ไหน / 那儿=ที่นั่น"}],"key_sentences":["星期几? = วันอะไร?","V + 不 + V = ...ไหม? (ถามทางเลือก)"],"vocab":[{"zh":"今天","py":"jīntiān","type":"名","en":"today","th":"วันนี้"},{"zh":"星期","py":"xīngqī","type":"名","en":"week","th":"สัปดาห์"},{"zh":"几","py":"jǐ","type":"代","en":"how many","th":"กี่"},{"zh":"二","py":"èr","type":"数","en":"two","th":"สอง"},{"zh":"三","py":"sān","type":"数","en":"three","th":"สาม"},{"zh":"四","py":"sì","type":"数","en":"four","th":"สี่"},{"zh":"哪儿","py":"nǎr","type":"代","en":"where","th":"ที่ไหน"},{"zh":"我","py":"wǒ","type":"代","en":"I; me","th":"ฉัน"},{"zh":"回","py":"huí","type":"动","en":"to return","th":"กลับ"},{"zh":"学校","py":"xuéxiào","type":"名","en":"school","th":"โรงเรียน"},{"zh":"再见","py":"zàijiàn","type":"动","en":"goodbye","th":"ลาก่อน"},{"zh":"对不起","py":"duìbuqǐ","type":"动","en":"sorry","th":"ขอโทษ"},{"zh":"没关系","py":"méi guānxi","type":"","en":"never mind","th":"ไม่เป็นไร"}],"exercises":[{"type":"fill","q":"你去___？(ที่ไหน)","a":"哪儿"},{"type":"build","q":"สร้างประโยค: คุณไปไหม? (去)","a":"你去不去？"},{"type":"translate","q":"Goodbye! (จีน)","a":"再见！"}]},"5":{"title":"这是王老师","title_en":"This is Mr. Wang","dialogue":[{"speaker":"A","zh":"请问，您贵姓？","py":"Qǐngwèn, nín guì xìng?","en":"May I ask your surname?","th":"ขอถามหน่อย ท่านแซ่อะไร?"},{"speaker":"B","zh":"我姓王，叫王明。你叫什么名字？","py":"Wǒ xìng Wáng, jiào Wáng Míng. Nǐ jiào shénme míngzi?","en":"My surname is Wang, my name is Wang Ming. What's your name?","th":"ฉันแซ่หวาง ชื่อหวางหมิง คุณชื่ออะไร?"},{"speaker":"A","zh":"我叫李小红。认识您，很高兴。","py":"Wǒ jiào Lǐ Xiǎohóng. Rènshi nín, hěn gāoxìng.","en":"I'm Li Xiaohong. Nice to meet you.","th":"ฉันชื่อหลี่เสี่ยวหง ยินดีที่ได้รู้จัก"}],"grammar":[{"rule":"姓名问法","zh":"您贵姓？/ 你叫什么名字？","en":"Asking someone's name (formal/informal)","example":"贵姓 = formal; 叫什么名字 = informal","th":"ถามชื่อ: แบบสุภาพ vs ทั่วไป"},{"rule":"认识+人","zh":"认识 + person","en":"To know/meet someone","example":"认识您，很高兴。","th":"รู้จัก + คน"}],"key_sentences":["这是...= นี่คือ...","请问 = ขอถาม (สุภาพ)","认识你，很高兴 = ยินดีที่ได้รู้จัก"],"vocab":[{"zh":"这","py":"zhè","type":"代","en":"this","th":"นี่"},{"zh":"是","py":"shì","type":"动","en":"to be","th":"เป็น; คือ"},{"zh":"老师","py":"lǎoshī","type":"名","en":"teacher","th":"ครู"},{"zh":"请问","py":"qǐngwèn","type":"","en":"May I ask...","th":"ขอถามหน่อย"},{"zh":"贵姓","py":"guìxìng","type":"","en":"Your surname? (polite)","th":"ท่านแซ่อะไร"},{"zh":"姓","py":"xìng","type":"动/名","en":"surname; to be surnamed","th":"นามสกุล"},{"zh":"叫","py":"jiào","type":"动","en":"to be called","th":"ชื่อ"},{"zh":"名字","py":"míngzi","type":"名","en":"name","th":"ชื่อ"},{"zh":"认识","py":"rènshi","type":"动","en":"to know; to recognize","th":"รู้จัก"},{"zh":"高兴","py":"gāoxìng","type":"形","en":"happy; glad","th":"ดีใจ"},{"zh":"也","py":"yě","type":"副","en":"also; too","th":"ด้วย"},{"zh":"呢","py":"ne","type":"助","en":"and (you)?","th":"แล้ว...ล่ะ?"},{"zh":"不客气","py":"bú kèqi","type":"","en":"you're welcome","th":"ไม่เป็นไร"}],"exercises":[{"type":"fill","q":"这___王老师。(เป็น)","a":"是"},{"type":"translate","q":"Nice to meet you. (จีน)","a":"认识你，很高兴。"},{"type":"choose","q":"ถามชื่ออย่างสุภาพ","options":["你叫什么？","您贵姓？","你是谁？"],"a":"您贵姓？"}]},"6":{"title":"你是哪国人","title_en":"Where are you from","dialogue":[{"speaker":"A","zh":"你是哪国 :"都","py":"dōu","type":"副","en":"all; both","th":"ทั้งหมด"},{"zh":"十","py":"shí","type":"数","en":"ten","th":"สิบ"},{"zh":"吧","py":"ba","type":"助","en":"particle (suggestion)","th":"อนุภาคแสดงข้อเสนอ"}],"exercises":[{"type":"fill","q":"你家___几口人？(มี)","a":"有"},{"type":"translate","q":"My family has 4 people. (จีน)","a":"我家有四口人。"},{"type":"choose","q":"ถามจำนวนคนในครอบครัว ใช้อะไร?","options":["多少","几","哪"],"a":"几"}]},"9":{"title":"这件衬衫多少钱","title_en":"How much is this shirt","dialogue":[{"speaker":"A","zh":"这件衬衫多少钱？","py":"Zhè jiàn chènshān duōshao qián?","en":"How much is this shirt?","th":"เสื้อเชิ้ตนี้ราคาเท่าไหร่?"},{"speaker":"B","zh":"三百五十块钱。","py":"Sānbǎi wǔshí kuài qián.","en":"350 yuan.","th":"สามร้อยห้าสิบหยวน"},{"speaker":"A","zh":"太贵了！便宜一点儿？","py":"Tài guì le! Piányī yīdiǎnr?","en":"Too expensive! A little cheaper?","th":"แพงเกินไป! ถูกหน่อยได้ไหม?"},{"speaker":"B","zh":"三百块，这是最低价了。","py":"Sānbǎi kuài, zhè shì zuì dī jià le.","en":"300 yuan, this is the lowest price.","th":"สามร้อยหยวน นี่ราคาต่ำสุดแล้ว"}],"grammar":[{"rule":"多少钱","zh":"多少钱？= How much?","en":"Asking price","example":"这件衬衫多少钱？= How much is this shirt?","th":"ถามราคา: 多少钱?"},{"rule":"太...了","zh":"太 + Adj + 了","en":"Too/very + adjective","example":"太贵了！= Too expensive!","th":"太...了 = ...เกินไป!"},{"rule":"钱的说法","zh":"元/块, 角/毛, 分","en":"Chinese money: yuan, jiao, fen","example":"三块五 = 3.5 yuan","th":"เงินจีน: หยวน เจี่ยว เฝิน"}],"key_sentences":["多少钱？= ราคาเท่าไหร่?","太贵了 = แพงเกินไป","便宜一点儿 = ถูกหน่อย"],"vocab":[{"zh":"件","py":"jiàn","type":"量","en":"(measure for clothes)","th":"(ลักษณนามสำหรับเสื้อผ้า)"},{"zh":"衬衫","py":"chènshān","type":"名","en":"shirt","th":"เสื้อเชิ้ต"},{"zh":"多少","py":"duōshao","type":"代","en":"how much/many","th":"เท่าไหร่"},{"zh":"百","py":"bǎi","type":"数","en":"hundred","th":"ร้อย"},{"zh":"块","py":"kuài","type":"量","en":"yuan (colloquial)","th":"หยวน (พูดทั่วไป)"},{"zh":"毛","py":"máo","type":"量","en":"jiao (0.1 yuan)","th":"เจี่ยว"},{"zh":"便宜","py":"piányi","type":"形", ","en":"(possessive particle)","th":"อนุภาคแสดงความเป็นเจ้าของ"},{"zh":"和","py":"hé","type":"连","en":"and","th":"และ"},{"zh":"们","py":"men","type":"助","en":"(plural suffix)","th":"คำต่อท้ายพหูพจน์"},{"zh":"我们","py":"wǒmen","type":"代","en":"we; us","th":"พวกเรา"},{"zh":"你们","py":"nǐmen","type":"代","en":"you (plural)","th":"พวกคุณ"},{"zh":"他们","py":"tāmen","type":"代","en":"they","th":"พวกเขา"},{"zh":"年级","py":"niánjí","type":"名","en":"grade; year","th":"ชั้นปี"},{"zh":"专业","py":"zhuānyè","type":"名","en":"major","th":"วิชาเอก"},{"zh":"帮助","py":"bāngzhù","type":"动/名","en":"to help","th":"ช่วย"}],"exercises":[{"type":"fill","q":"我们___是学生。(ทั้งหมด)","a":"都"},{"type":"translate","q":"Who is that? (จีน)","a":"那位是谁？"},{"type":"choose","q":"พหูพจน์ต่อท้าย","options":["了","们","的"],"a":"们"}]},"12":{"title":"你的爱好是什么","title_en":"What is your hobby","dialogue":[{"speaker":"A","zh":"你的爱好是什么？","py":"Nǐ de àihào shì shénme?","en":"What is your hobby?","th":"งานอดิเรกของคุณคืออะไร?"},{"speaker":"B","zh":"我喜欢唱歌、跳舞，还喜欢游泳。你呢？","py":"Wǒ xǐhuan chàng gē, tiào wǔ, hái xǐhuan yóuyǒng. Nǐ ne?","en":"I like singing, dancing, and also swimming. You?","th":"ฉันชอบร้องเพลง เต้นรำ และยังชอบว่ายน้ำด้วย แล้วคุณล่ะ?"},{"speaker":"A","zh":"我比较喜欢打球和爬山。","py":"Wǒ bǐjiào xǐhuan dǎ qiú hé pá shān.","en":"I relatively like playing ball and mountain climbing.","th":"ฉันค่อนข้างชอบเล่นบอลและปีนเขา"}],"grammar":[{"rule":"喜欢+V/N","zh":"喜欢 + V/N","en":"To like (doing) something","example":"我喜欢唱歌。= I like singing.","th":"喜欢 + กริยา/คำนาม = ชอบ..."},{"rule":"比较+Adj","zh":"比较 + Adj","en":"Relatively/comparatively","example":"比较贵 = relatively expensive","th":"比较 + คุณศัพท์ = ค่อนข้าง..."},{"rule":"还","zh":"还 + V","en":"Still; also in addition","example":"还喜欢游泳 = also like swimming","th":"还 + กริยา = ยัง...ด้วย"}],"key_sentences":["你的爱好是什么？= งานอดิเรกคืออะไร?","喜欢 + กริยา = ชอบ...","比较 = ค่อนข้าง"],"vocab":[{"zh":"爱好","py":"àihào","type":"名/动","en":"hobby","th":"งานอดิเรก"},{"zh":"喜欢","py":"xǐhuan","type":"动","en": + Time + V","en":"Temporal words as adverbials (placed before verb or subject)","example":"晚上你做什么？我晚上复习课文。","th":"คำบอกเวลาวางหน้ากริยาหรือประธาน"},{"rule":"还是 vs 或者","zh":"还是 (questions) vs 或者 (statements)","en":"还是 for alternative questions; 或者 for declarative sentences","example":"你喝茶还是咖啡？(Q) / 我喝茶或者咖啡。(S)","th":"还是 ใช้ในคำถาม, 或者 ใช้ในประโยคบอกเล่า"},{"rule":"吧 particle","zh":"S + V + 吧","en":"Modal particle 吧 for suggestion or agreement","example":"咱们走吧。= Let's go. / 好吧。= OK.","th":"吧 แสดงข้อเสนอหรือความเห็นด้วย"}]},"17":{"title":"他在做什么呢","title_en":"What is he doing","vocab":[{"zh":"在","py":"zài","type":"副、动","en":"in progress; at; in","th":"กำลัง; อยู่ที่"},{"zh":"正在","py":"zhèngzài","type":"副","en":"in the process of; right now","th":"กำลัง (ตอนนี้)"},{"zh":"呢","py":"ne","type":"助","en":"particle (for ongoing action)","th":"อนุภาค (แสดงการกระทำต่อเนื่อง)"},{"zh":"电视","py":"diànshì","type":"名","en":"television; TV","th":"โทรทัศน์; ทีวี"},{"zh":"骑","py":"qí","type":"动","en":"to ride (a bike/horse)","th":"ขี่"},{"zh":"怎么","py":"zěnme","type":"代","en":"how; why","th":"อย่างไร; ทำไม"},{"zh":"教","py":"jiāo","type":"动","en":"to teach","th":"สอน"},{"zh":"让","py":"ràng","type":"动、介","en":"to let; to allow; to make","th":"ให้; อนุญาต"},{"zh":"写","py":"xiě","type":"动","en":"to write","th":"เขียน"},{"zh":"谁","py":"shéi","type":"代","en":"who; whom","th":"ใคร"},{"zh":"同","py":"tóng","type":"形、介","en":"same; together with","th":"เดียวกัน; ร่วมกับ"},{"zh":"打电话","py":"dǎ diànhuà","type":"动","en":"to make a phone call","th":"โทรศัพท์"},{"zh":"电话","py":"diànhuà","type":"名","en":"telephone; phone call","th":"โทรศัพท์"},{"zh":"作业","py":"zuòyè","type":"名","en":"homework; assignment","th":"การบ้าน"}],"dialogue":[{"sp":"玛丽","zh":"麦克在宿舍吗？","py":"Màikè zài sùshè ma?","th":"แมคอยู่ในหอพักไหม?"},{"sp":"爱德华","zh":"在。","py":"Zài.","th":"อยู่"},{"sp":"玛丽","zh":"他在做什么呢？","py":"Tā zài zuò shénme ne?","th":"เขากำลังทำอะไรอยู่?"},{"sp":"爱德华","zh":"我出来的时候，他正在听音乐呢。","py":"Wǒ chūlai de shíhou, tā zhèngzài tīng yīnyuè ne.","th":"ตอนที่ฉันออกมา เขากำลังฟังเพลงอยู่"},{"sp":"玛丽","zh":"你是不是在听音乐呢？","py":"Nǐ shì bu shì zài tīng yīnyuè ne?","th":"คุณกำลังฟังเพลงอยู่ใช่ไหม?"},{"sp":"麦克","zh":"没有，我正听课文录音呢。","py":"Méiyǒu, wǒ zhèng tīng kèwén lùyīn ne.","th":"ไม่ใช่ ฉันกำลังฟังเสียงบทเรียนอยู่"}],"grammar":[{"rule":"在/正在/正+V+呢","zh":"在/正在/正 + V (+ 呢)","en":"Expressing ongoing action (progressive aspect)","example":"他正在听音乐呢。= He is listening to music.","th":"在/正在/正 + กริยา = กำลัง... (Continuous tense)"},{"rule":"双宾语句","zh":"S + V + IO + DO","en":"Sentences with two objects (indirect + direct object)","example":"老师教我们语法。= The teacher teaches us grammar.","th":"ประโยคสองกรรม: กริยา + กรรมทางอ้อม + กรรมตรง"},{"rule":"怎么+V","zh":"怎么 + V","en":"Asking how an action is done","example":"你怎么去？= How are you going?","th":"怎么 + กริยา = ...อย่างไร?"}]},"18":{"title":"我去超市买东西","title_en":"I'm going to the supermarket to do some shopping","vocab":[{"zh":"超市","py":"chāoshì","type":"名","en":"supermarket","th":"ซูเปอร์มาร์เก็ต"},{"zh":"东西","py":"dōngxi","type":"名","en":"thing; stuff","th":"ของ; สิ่งของ"},{"zh":"顺便","py":"shùnbiàn","type":"副","en":"conveniently; while you're at it","th":"สะดวก; แวะ"},{"zh":"替","py":"tì","type":"介","en":"for; on behalf of","th":"แทน; เพื่อ"},{"zh":"问题","py":"wèntí","type":"名","en":"question; problem","th":"คำถาม; ปัญหา"},{"zh":"代表团","py":"dàibiǎotuán","type":"名","en":"delegation","th":"คณะผู้แทน"},{"zh":"参观","py":"cānguān","type":"动","en":"to visit; to tour","th":"เยี่ยมชม"},{"zh":"外贸","py":"wàimào","type":"名","en":"foreign trade","th":"การค้าต่างประเทศ"},{"zh":"上海","py":"Shànghǎi","type":"名","en":"Shanghai","th":"เซี่ยงไฮ้"},{"zh":"帮","py":"bāng","type":"动","en":"to help; to assist","th":"ช่วย"},{"zh":"水果","py":"shuǐguǒ","type":"名","en":"fruit","th":"ผลไม้"},{"zh":"蔬菜","py":"shūcài","type":"名","en":"vegetables","th":"ผัก"},{"zh":"需要","py":"xūyào","type":"动","en":"to need; to require","th":"ต้องการ; จำเป็น"}],"dialogue":[{"sp":"麦克","zh":"玛丽，你去哪儿？","py":"Màikè: Mǎlì, nǐ qù nǎr?","th":"แมรี่ คุณจะไปไหน?"},{"sp":"玛丽","zh":"我去超市买东西。你有什么事儿吗？","py":"Wǒ qù chāoshì mǎi dōngxi. Nǐ yǒu shénme shìr ma?","th":"ฉันไปซุปเปอร์มาร์เก็ตซื้อของ คุณมีธุระอะไรไหม?"},{"sp":"麦克","zh":"你顺便替我买一盒曲别针和一本《读者》吧。","py":"Nǐ shùnbiàn tì wǒ mǎi yī hé qūbiézhēn hé yī běn Dúzhě ba.","th":"ช่วยซื้อลวดเสียบกระดาษหนึ่งกล่องและนิตยสาร Duzhe หนึ่งเล่มให้ฉันด้วย"},{"sp":"玛丽","zh":"没问题。你还需要别的吗？","py":"Méi wèntí. Nǐ hái xūyào bié de ma?","th":"ไม่มีปัญหา ต้องการอะไรอีกไหม?"},{"sp":"麦克","zh":"不用了，谢谢。","py":"Bú yòng le, xièxie.","th":"ไม่ต้องแล้ว ขอบคุณ"}],"grammar":[{"rule":"连动句","zh":"S + V₁ + V₂","en":"Sentences with serial verb construction","example":"我去超市买东西。= I go to the supermarket to buy things.","th":"ประโยคกริยาต่อเนื่อง: ไป + ทำ..."},{"rule":"顺便","zh":"顺便 + V","en":"To do something conveniently while doing something else","example":"你顺便替我买一下。= Buy it for me while you're at it.","th":"顺便 = แวะ/สะดวก + กริยา"}]},"19":{"title":"可以试试吗","title_en":"May I try it on","vocab":[{"zh":"可以","py":"kěyǐ","type":"助动","en":"can; may; possible","th":"สามารถ; ได้"},{"zh":"试","py":"shì","type":"动","en":"to try; to test","th":"ลอง"},{"zh":"又","py":"yòu","type":"副","en":"again; also; and","th":"อีกครั้ง; และ"},{"zh":"漂亮","py":"piàoliang","type":"形","en":"beautiful; pretty","th":"สวย; หล่อ"},{"zh":"一点儿","py":"yīdiǎnr","type":"","en":"a little bit","th":"นิดหน่อย"},{"zh":"人民币","py":"rénmínbì","type":"名","en":"RMB; Chinese currency","th":"เงินหยวน"},{"zh":"商店","py":"shāngdiàn","type":"名","en":"shop; store","th":"ร้านค้า"},{"zh":"打折","py":"dǎ zhé","type":"动","en":"to give a discount","th":"ลดราคา"},{"zh":"换","py":"huàn","type":"动","en":"to exchange; to change","th":"แลก; เปลี่ยน"},{"zh":"合适","py":"héshì","type":"形","en":"suitable; appropriate; fit","th":"เหมาะสม; พอดี"},{"zh":"大小","py":"dàxiǎo","type":"名","en":"size","th":"ขนาด"},{"zh":"款式","py":"kuǎnshì","type":"名","en":"style; fashion; design","th":"สไตล์; รูปแบบ"}],"dialogue":[{"sp":"玛丽","zh":"这件毛衣可以试试吗？","py":"Zhè jiàn máoyī kěyǐ shì shi ma?","th":"เสื้อสเวตเตอร์ตัวนี้ลองสวมได้ไหม?"},{"sp":"售货员","zh":"当然可以。这件很漂亮，又大方又好看。","py":"Dāngrán kěyǐ. Zhè jiàn hěn piàoliang, yòu dàfang yòu hǎokàn.","th":"แน่นอนได้ ตัวนี้สวยมาก ดูสุภาพและสวยงาม"},{"sp":"玛丽","zh":"多少钱？","py":"Duōshao qián?","th":"ราคาเท่าไหร่?"},{"sp":"售货员","zh":"三百五十块。","py":"Sānbǎi wǔshí kuài.","th":"สามร้อยห้าสิบหยวน"},{"sp":"玛丽","zh":"太贵了，便宜一点儿吧。","py":"Tài guì le, piányī yīdiǎnr ba.","th":"แพงไปหน่อย ลดหน่อยได้ไหม"},{"sp":"售货员","zh":"那就三百块吧，这是最低价了。","py":"Nà jiù sānbǎi kuài ba, zhè shì zuì dī jià le.","th":"งั้นสามร้อยหยวนนะ นี่เป็นราคาต่ำสุดแล้ว"}],"grammar":[{"rule":"可以+V","zh":"可以 + V","en":"Can/may do something (permission or possibility)","example":"可以试试吗？= May I try it on?","th":"可以 + กริยา = สามารถ/ได้"},{"rule":"又...又...","zh":"又 + Adj/V + 又 + Adj/V","en":"Both...and... (two qualities simultaneously)","example":"又大方又好看 = both elegant and good-looking","th":"又...又... = ทั้ง...และ..."},{"rule":"一点儿 usage","zh":"Adj + 一点儿 (after adj)","en":"A little bit (placed after adjective)","example":"便宜一点儿 = a little cheaper","th":"คุณศัพท์ + 一点儿 = ...หน่อย"}]},"20":{"title":"祝你生日快乐","title_en":"Happy birthday to you","vocab":[{"zh":"祝","py":"zhù","type":"动","en":"to wish; to express good wishes","th":"อวยพร"},{"zh":"生日","py":"shēngrì","type":"名","en":"birthday","th":"วันเกิด"},{"zh":"快乐","py":"kuàilè","type":"形","en":"happy; joyful","th":"มีความสุข"},{"zh":"年","py":"nián","type":"名、量","en":"year","th":"ปี"},{"zh":"月","py":"yuè","type":"名、量","en":"month; moon","th":"เดือน"},{"zh":"号","py":"hào","type":"名、量","en":"date; number","th":"วันที่; หมายเลข"},{"zh":"大学","py":"dàxué","type":"名","en":"university; college","th":"มหาวิทยาลัย"},{"zh":"毕业","py":"bì yè","type":"动","en":"to graduate","th":"เรียนจบ"},{"zh":"属","py":"shǔ","type":"动","en":"to belong to; zodiac sign year","th":"เกิดปี (ราศีจีน)"},{"zh":"岁","py":"suì","type":"量","en":"year of age","th":"ขวบ; ปี (อายุ)"},{"zh":"同岁","py":"tóng suì","type":"","en":"same age","th":"อายุเท่ากัน"},{"zh":"送","py":"sòng","type":"动","en":"to give (as a gift); to send","th":"ให้ (ของขวัญ); ส่ง"},{"zh":"礼物","py":"lǐwù","type":"名","en":"gift; present","th":"ของขวัญ"},{"zh":"蛋糕","py":"dàngāo","type":"名","en":"cake","th":"เค้ก"}],"dialogue":[{"sp":"A","zh":"你哪一年大学毕业？","py":"Nǐ nǎ yī nián dàxué bìyè?","th":"คุณเรียนจบมหาวิทยาลัยปีไหน?"},{"sp":"B","zh":"二〇一五年。你呢？","py":"Èr líng yī wǔ nián. Nǐ ne?","th":"ปี 2015 แล้วคุณล่ะ?"},{"sp":"A","zh":"我是二〇一六年毕业的。你是几月几号生日？","py":"Wǒ shì èr líng yī liù nián bìyè de. Nǐ shì jǐ yuè jǐ hào shēngrì?","th":"ฉันจบปี 2016 คุณเกิดวันที่เท่าไหร่เดือนอะไร?"},{"sp":"B","zh":"三月二十号。祝你生日快乐！","py":"Sān yuè èrshí hào. Zhù nǐ shēngrì kuàilè!","th":"20 มีนาคม อวยพรวันเกิดให้คุณด้วย!"},{"sp":"A","zh":"谢谢你！你属什么？","py":"Xièxie nǐ! Nǐ shǔ shénme?","th":"ขอบคุณ! คุณเกิดปีอะไร?"},{"sp":"B","zh":"我属狗，今年三十岁了。","py":"Wǒ shǔ gǒu, jīnnián sānshí suì le.","th":"ฉันเกิดปีหมา ปีนี้อายุสามสิบแล้ว"}],"grammar":[{"rule":"名词谓语句","zh":"S + 年/月/号 (no 是)","en":"Nominal predicate for dates (no 是 needed)","example":"今天三月二十号。= Today is March 20th.","th":"ประโยคคำนามเป็นภาคแสดง ไม่ต้องใช้ 是 สำหรับวันที่"},{"rule":"年月日表达","zh":"年/月/号/星期 (big→small)","en":"Date expression order: year → month → day → weekday","example":"二〇二五年三月二十号，星期四","th":"บอกวันที่: ปี → เดือน → วัน → วันในสัปดาห์"},{"rule":"疑问语调","zh":"Rising intonation for 吗 questions","en":"Interrogative intonation (6) — rising tone","example":"你是几月几号生日？","th":"การใช้เสียงสูงขึ้นในคำถาม"}]},"21":{"title":"我们明天七点一刻出发","title_en":"Tomorrow we'll depart at a quarter past seven","vocab":[{"zh":"点","py":"diǎn","type":"量","en":"o'clock; dot; point","th":"โมง"},{"zh":"分","py":"fēn","type":"量","en":"minute; fen","th":"นาที"},{"zh":"刻","py":"kè","type":"量","en":"quarter (of an hour)","th":"สิบห้านาที; ควอเตอร์"},{"zh":"半","py":"bàn","type":"数","en":"half","th":"ครึ่ง"},{"zh":"早上","py":"zǎoshang","type":"名","en":"morning","th":"ตอนเช้า"},{"zh":"上午","py":"shàngwǔ","type":"名","en":"morning (before noon)","th":"ช่วงเช้า"},{"zh":"下午","py":"xiàwǔ","type":"名","en":"afternoon","th":"ช่วงบ่าย"},{"zh":"出发","py":"chūfā","type":"动","en":"to set out; to depart","th":"ออกเดินทาง"},{"zh":"起床","py":"qǐ chuáng","type":"动","en":"to get up; to get out of bed","th":"ตื่นนอน"},{"zh":"吃饭","py":"chī fàn","type":"动","en":"to eat (a meal)","th":"กินข้าว"},{"zh":"上课","py":"shàng kè","type":"动","en":"to go to class; to attend class","th":"เข้าเรียน"},{"zh":"下课","py":"xià kè","type":"动","en":"class is over; to finish class","th":"เลิกเรียน"},{"zh":"睡觉","py":"shuì jiào","type":"动","en":"to sleep; to go to bed","th":"นอนหลับ"},{"zh":"差","py":"chà","type":"动","en":"to lack; to be short of","th":"ขาด; อีก (เวลา)"},{"zh":"聊天儿","py":"liáo tiānr","type":"动","en":"to chat; to have a talk","th":"คุย; สนทนา"}],"dialogue":[{"sp":"A","zh":"我的一天：我每天六点半起床，七点吃早饭。上午八点上课，十二点下课。","py":"Wǒ de yītiān: Wǒ měi tiān liù diǎn bàn qǐchuáng, qī diǎn chī zǎofàn.","th":"หนึ่งวันของฉัน: ฉันตื่นทุกวันหกโมงครึ่ง เจ็ดโมงกินข้าวเช้า เรียนแปดโมงเช้า เลิกเรียนเที่ยง"},{"sp":"B","zh":"明天早上七点一刻出发，同学们，大家准备好了吗？","py":"Míngtiān zǎoshang qī diǎn yī kè chūfā, tóngxuémen, dàjiā zhǔnbèi hǎo le ma?","th":"พรุ่งนี้เช้าเจ็ดโมงสิบห้านาทีออกเดินทาง เพื่อนๆ ทุกคนเตรียมพร้อมแล้วหรือยัง?"},{"sp":"A","zh":"我常常去朋友那儿聊天儿。","py":"Wǒ cháng cháng qù péngyou nàr liáo tiānr.","th":"ฉันมักไปคุยกับเพื่อน"}],"grammar":[{"rule":"时间的表达","zh":"点/刻/半/差 for time","en":"Expressing time: o'clock/quarter/half/to","example":"七点一刻=7:15 / 七点半=7:30 / 差五分八点=7:55","th":"การบอกเวลา: 点(โมง) 刻(สิบห้า) 半(ครึ่ง) 差(อีก)"},{"rule":"每天+时间+V","zh":"每天 + time + V","en":"Daily routine expressions","example":"我每天七点起床。= I get up at 7 every day.","th":"ทุกวัน + เวลา + กริยา"}]},"22":{"title":"我打算请老师教我京剧","title_en":"I'm planning to find a teacher to teach me Peking opera","vocab":[{"zh":"打算","py":"dǎsuàn","type":"动、名","en":"to plan; plan; intention","th":"วางแผน; แผน"},{"zh":"请","py":"qǐng","type":"动","en":"to invite; please","th":"เชิญ; กรุณา"},{"zh":"京剧","py":"jīngjù","type":"名","en":"Peking opera","th":"งิ้วปักกิ่ง"},{"zh":"以前","py":"yǐqián","type":"名","en":"before; previously; in the past","th":"ก่อน; ก่อนหน้านี้"},{"zh":"以后","py":"yǐhòu","type":"名","en":"after; afterwards; in the future","th":"หลังจาก; ต่อไป"},{"zh":"书法","py":"shūfǎ","type":"名","en":"calligraphy","th":"การเขียนพู่กัน; คัดลายมือ"},{"zh":"感兴趣","py":"gǎn xìngqù","type":"","en":"to be interested in","th":"สนใจ"},{"zh":"兴趣","py":"xìngqù","type":"名","en":"interest; hobby","th":"ความสนใจ"},{"zh":"太极拳","py":"tàijíquán","type":"名","en":"tai chi","th":"ไทเก็ก"},{"zh":"武术","py":"wǔshù","type":"名","en":"martial arts","th":"ศิลปะการต่อสู้"},{"zh":"画","py":"huà","type":"动、名","en":"to draw/paint; painting","th":"วาด; ภาพ"},{"zh":"国画","py":"guóhuà","type":"名","en":"traditional Chinese painting","th":"จิตรกรรมจีนแบบดั้งเดิม"}],"dialogue":[{"sp":"A","zh":"你打算请老师教你什么？","py":"Nǐ dǎsuàn qǐng lǎoshī jiāo nǐ shénme?","th":"คุณวางแผนจะให้ครูสอนอะไร?"},{"sp":"B","zh":"我打算请老师教我京剧。我来中国以前就对书法特别感兴趣。","py":"Wǒ dǎsuàn qǐng lǎoshī jiāo wǒ jīngjù. Wǒ lái Zhōngguó yǐqián jiù duì shūfǎ tèbié gǎn xìngqù.","th":"ฉันวางแผนจะให้ครูสอนงิ้วปักกิ่ง ก่อนมาจีนฉันก็สนใจการเขียนพู่กันเป็นพิเศษอยู่แล้ว"},{"sp":"A","zh":"你是啊。你喜欢看京剧吗？","py":"Nǐ shì a. Nǐ xǐhuan kàn jīngjù ma?","th":"อย่างนั้นเหรอ คุณชอบดูงิ้วไหม?"},{"sp":"B","zh":"是啊，我对中国传统文化很感兴趣。","py":"Shì a, wǒ duì Zhōngguó chuántǒng wénhuà hěn gǎn xìngqù.","th":"ใช่ ฉันสนใจวัฒนธรรมดั้งเดิมจีนมาก"}],"grammar":[{"rule":"打算+V","zh":"打算 + V","en":"To plan to do something","example":"我打算请老师教我京剧。= I plan to ask a teacher to teach me Peking opera.","th":"打算 + กริยา = วางแผนจะ..."},{"rule":"以前/以后","zh":"以前 (before) / 以后 (after/later)","en":"以前 = before; 以后 = after, in the future","example":"来中国以前 = before coming to China; 以后我去 = I'll go later","th":"以前 = ก่อน; 以后 = หลังจาก/ต่อไป"},{"rule":"兼语句","zh":"S + V₁ + O₁(=S₂) + V₂","en":"Pivotal sentence — object of V₁ is subject of V₂","example":"我请老师教我。= I invite teacher (to) teach me.","th":"ประโยคกรรมเป็นประธาน: ฉันขอให้ครูสอนฉัน"}]},"23":{"title":"学校里边有银行吗","title_en":"Is there a bank on campus","vocab":[{"zh":"里边","py":"lǐbian","type":"名","en":"inside; interior","th":"ข้างใน"},{"zh":"旁边","py":"pángbiān","type":"名","en":"beside; next to","th":"ข้างๆ"},{"zh":"前边","py":"qiánbian","type":"名","en":"in front; ahead","th":"ข้างหน้า"},{"zh":"后边","py":"hòubian","type":"名","en":"behind; at the back","th":"ข้างหลัง"},{"zh":"左边","py":"zuǒbian","type":"名","en":"left side","th":"ด้านซ้าย"},{"zh":"右边","py":"yòubian","type":"名","en":"right side","th":"ด้านขวา"},{"zh":"离","py":"lí","type":"介","en":"from; away from","th":"ห่างจาก"},{"zh":"从","py":"cóng","type":"介","en":"from","th":"จาก"},{"zh":"往","py":"wǎng","type":"介","en":"towards; to","th":"ไปทาง"},{"zh":"多远","py":"duō yuǎn","type":"","en":"how far","th":"ไกลแค่ไหน"},{"zh":"远","py":"yuǎn","type":"形","en":"far; distant","th":"ไกล"},{"zh":"近","py":"jìn","type":"形","en":"near; close","th":"ใกล้"},{"zh":"米","py":"mǐ","type":"量","en":"meter","th":"เมตร"},{"zh":"公里","py":"gōnglǐ","type":"量","en":"kilometer","th":"กิโลเมตร"},{"zh":"博物馆","py":"bówùguǎn","type":"名","en":"museum","th":"พิพิธภัณฑ์"},{"zh":"图书馆","py":"túshūguǎn","type":"名","en":"library","th":"ห้องสมุด"}],"dialogue":[{"sp":"A","zh":"请问，学校里边有银行吗？","py":"Qǐngwèn, xuéxiào lǐbian yǒu yínháng ma?","th":"ขอถามหน่อย ในมหาวิทยาลัยมีธนาคารไหม?"},{"sp":"B","zh":"有，就在图书馆旁边。","py":"Yǒu, jiù zài túshūguǎn pángbiān.","th":"มี อยู่ข้างๆ ห้องสมุดเลย"},{"sp":"A","zh":"从这儿到博物馆有多远？","py":"Cóng zhèr dào bówùguǎn yǒu duō yuǎn?","th":"จากที่นี่ไปพิพิธภัณฑ์ไกลแค่ไหน?"},{"sp":"B","zh":"不太远，有七八百米吧。","py":"Bú tài yuǎn, yǒu qī bā bǎi mǐ ba.","th":"ไม่ไกลมาก ประมาณเจ็ดแปดร้อยเมตร"},{"sp":"A","zh":"往哪儿走？","py":"Wǎng nǎr zǒu?","th":"เดินไปทางไหน?"},{"sp":"B","zh":"往前走，到十字路口往右拐，再走五分钟就到了。","py":"Wǎng qián zǒu, dào shízì lùkǒu wǎng yòu guǎi, zài zǒu wǔ fēnzhōng jiù dào le.","th":"เดินไปข้างหน้า ถึงสี่แยกให้เลี้ยวขวา เดินอีกห้านาทีก็ถึง"}],"grammar":[{"rule":"方位词","zh":"里/旁/前/后/左/右/上/下/边","en":"Nouns of locality (position words)","example":"图书馆旁边 = next to the library; 学校里边 = inside the school","th":"คำบอกตำแหน่ง: ใน/ข้าง/หน้า/หลัง/ซ้าย/ขวา"},{"rule":"存在句","zh":"Place + 有/是 + Object","en":"Existence sentences","example":"学校里有银行。= There is a bank in the school.","th":"ประโยคแสดงการมีอยู่: ที่... + มี + สิ่งของ"},{"rule":"离/从/往","zh":"离(from-distance) / 从(from-origin) / 往(toward)","en":"Prepositions of distance/direction","example":"离这儿很近。从这儿往右走。","th":"离=ห่างจาก, 从=จาก, 往=ไปทาง"}]},"24":{"title":"我想学太极拳","title_en":"I want to learn tai chi","vocab":[{"zh":"想","py":"xiǎng","type":"助动、动","en":"to want to; to think; to miss","th":"อยาก; คิด; คิดถึง"},{"zh":"能","py":"néng","type":"助动","en":"can; to be able to","th":"สามารถ"},{"zh":"会","py":"huì","type":"助动","en":"can; to know how to","th":"สามารถ; รู้วิธี"},{"zh":"应该","py":"yīnggāi","type":"助动","en":"should; ought to","th":"ควร"},{"zh":"遍","py":"biàn","type":"量","en":"measure word for actions done from start to finish","th":"รอบ; ครั้ง (ตั้งแต่ต้นจนจบ)"},{"zh":"慢","py":"màn","type":"形","en":"slow","th":"ช้า"},{"zh":"再","py":"zài","type":"副","en":"again; once more","th":"อีกครั้ง"},{"zh":"说","py":"shuō","type":"动","en":"to speak; to say","th":"พูด"},{"zh":"从","py":"cóng","type":"介","en":"from","th":"จาก"},{"zh":"到","py":"dào","type":"介、动","en":"to; until; to arrive","th":"ถึง; ไปถึง"},{"zh":"原因","py":"yuányīn","type":"名","en":"reason; cause","th":"เหตุผล; สาเหตุ"},{"zh":"因为","py":"yīnwèi","type":"连","en":"because","th":"เพราะ"},{"zh":"所以","py":"suǒyǐ","type":"连","en":"so; therefore","th":"ดังนั้น; จึง"}],"dialogue":[{"sp":"A","zh":"您能不能再说一遍？","py":"Nín néng bu néng zài shuō yī biàn?","th":"คุณช่วยพูดอีกครั้งได้ไหม?"},{"sp":"B","zh":"当然可以。我想学太极拳。","py":"Dāngrán kěyǐ. Wǒ xiǎng xué tàijíquán.","th":"แน่นอนได้ ฉันอยากเรียนไทเก็ก"},{"sp":"A","zh":"从几点到几点上课？","py":"Cóng jǐ diǎn dào jǐ diǎn shàng kè?","th":"เรียนตั้งแต่กี่โมงถึงกี่โมง?"},{"sp":"B","zh":"从早上八点到十点。你为什么想学太极拳？","py":"Cóng zǎoshang bā diǎn dào shí diǎn. Nǐ wèishénme xiǎng xué tàijíquán?","th":"ตั้งแต่แปดโมงเช้าถึงสิบโมง คุณทำไมถึงอยากเรียนไทเก็ก?"},{"sp":"A","zh":"因为太极拳对身体很好，所以我想学。","py":"Yīnwèi tàijíquán duì shēntǐ hěn hǎo, suǒyǐ wǒ xiǎng xué.","th":"เพราะไทเก็กดีต่อสุขภาพ จึงอยากเรียน"}],"grammar":[{"rule":"能愿动词","zh":"能/会/可以/想/要/应该 + V","en":"Modal verbs (ability, permission, desire, obligation)","example":"您能不能再说一遍？能 = can/able to","th":"助动词: 能(ทำได้) 会(รู้วิธี) 可以(ได้) 想(อยาก)"},{"rule":"因为...所以...","zh":"因为 + reason + 所以 + result","en":"Because...therefore... (cause and result)","example":"因为太极拳好，所以我学。= Because t'ai chi is good, so I learn it.","th":"เพราะ...ดังนั้น... (เหตุและผล)"},{"rule":"从...到...","zh":"从 + start + 到 + end","en":"From...to... (time or place range)","example":"从八点到十点 = from 8 to 10 o'clock","th":"จาก...ถึง... (ช่วงเวลาหรือระยะทาง)"}]},"25":{"title":"她学得很好","title_en":"She learns well","vocab":[{"zh":"得","py":"de","type":"助","en":"structural particle (complement marker)","th":"อนุภาคแสดงประสิทธิภาพ"},{"zh":"起","py":"qǐ","type":"动","en":"to rise; to get up","th":"ลุก; ตื่น"},{"zh":"每天","py":"měi tiān","type":"","en":"every day; daily","th":"ทุกวัน"},{"zh":"早","py":"zǎo","type":"形、名","en":"early; morning","th":"เช้า; แต่เช้า"},{"zh":"打","py":"dǎ","type":"动","en":"to hit; to play (sports/games)","th":"ตี; เล่น (กีฬา)"},{"zh":"球","py":"qiú","type":"名","en":"ball","th":"ลูกบอล"},{"zh":"跑步","py":"pǎo bù","type":"动","en":"to run; to jog","th":"วิ่ง; จ็อกกิ้ง"},{"zh":"还可以","py":"hái kěyǐ","type":"","en":"passable; not bad; so-so","th":"พอใช้ได้; ก็โอเค"},{"zh":"努力","py":"nǔlì","type":"形、副","en":"hardworking; diligently","th":"ขยัน; อย่างตั้งใจ"},{"zh":"进步","py":"jìnbù","type":"动、名","en":"to make progress; progress","th":"ก้าวหน้า; ความก้าวหน้า"},{"zh":"继续","py":"jìxù","type":"动","en":"to continue; to go on","th":"ต่อ; ดำเนินต่อ"},{"zh":"加油","py":"jiā yóu","type":"动","en":"come on!; to cheer on; to make an effort","th":"สู้ๆ; เพิ่มความพยายาม"}],"dialogue":[{"sp":"A","zh":"她学得很好，她每天都起得很早。","py":"Tā xué de hěn hǎo, tā měi tiān dōu qǐ de hěn zǎo.","th":"เธอเรียนเก่งมาก เธอตื่นเช้าทุกวัน"},{"sp":"B","zh":"您看她太极拳打得怎么样？","py":"Nín kàn tā tàijíquán dǎ de zěnmeyàng?","th":"คุณคิดว่าเธอเล่นไทเก็กเป็นอย่างไรบ้าง?"},{"sp":"A","zh":"打得还可以，但是还需要多练习。","py":"Dǎ de hái kěyǐ, dànshì hái xūyào duō liànxí.","th":"พอใช้ได้ แต่ยังต้องฝึกเพิ่มอีก"},{"sp":"B","zh":"她每天都练习吗？","py":"Tā měi tiān dōu liànxí ma?","th":"เธอฝึกทุกวันไหม?"},{"sp":"A","zh":"对，她每天都起得很早来练习。","py":"Duì, tā měi tiān dōu qǐ de hěn zǎo lái liànxí.","th":"ใช่ เธอตื่นแต่เช้าทุกวันมาฝึก"}],"grammar":[{"rule":"状态补语(1)","zh":"V + 得 + Adj/Adv","en":"Complement of state (describing manner/degree of action)","example":"她学得很好。= She studies very well. / 起得很早 = get up very early","th":"V + 得 + คุณศัพท์ = ทำ...ได้...มาก (บอกระดับ)"},{"rule":"得 structure","zh":"V + 得 + complement","en":"得 links verb to its result/degree complement","example":"打得好 = play well; 说得很流利 = speak very fluently","th":"กริยา + 得 + ส่วนขยายระดับ"}]}}},"speaking":{"name":"汉语口语速成 入门篇","name_en":"Short-Term Spoken Chinese Threshold Vol.1","name_th":"ฮั่นอวี่โข่วอวี่ซู่เฉิง เล่มเริ่มต้น","color":"#e67e22","lessons":{"1":{"title":"你好","title_en":"HELLO","dialogue":[{"sp":"A","zh":"你好！","py":"Nǐ hǎo!","th":"สวัสดี!"},{"sp":"B","zh":"你好！","py":"Nǐ hǎo!","th":"สวัสดี!"}],"vocab":[{"zh":"你好","py":"nǐ hǎo","type":"","en":"Hello","th":"สวัสดี"},{"zh":"你","py":"nǐ","type":"代","en":"you","th":"คุณ"},{"zh":"好","py":"hǎo","type":"形","en":"good","th":"ดี"}],"grammar":[{"rule":"声调 Tones","zh":"四个声调：阴平/阳平/上声/去声","en":"4 tones: 1st (flat) / 2nd (rising) / 3rd (dipping) / 4th (falling)","example":"妈má / 麻má / 马mǎ / 骂mà","th":"4 วรรณยุกต์จีน: สูง/สูงขึ้น/ต่ำลงขึ้น/ลง"}]},"2":{"title":"你好吗","title_en":"HOW ARE YOU","dialogue":[{"sp":"A","zh":"你好吗？","py":"Nǐ hǎo ma?","th":"คุณสบายดีไหม?"},{"sp":"B","zh":"我很好，谢谢。你呢？","py":"Wǒ hěn hǎo, xièxie. Nǐ ne?","th":"ฉันสบายดี ขอบคุณ แล้วคุณล่ะ?"},{"sp":"A","zh":"我也很好。","py":"Wǒ yě hěn hǎo.","th":"ฉันก็สบายดี"}],"vocab":[{"zh":"吗","py":"ma","type":"助","en":"question particle","th":"อนุ 局有多远？","py":"Cóng zhèr dào yóujú yǒu duō yuǎn?","th":"จากที่นี่ไปถึงที่ทำการไปรษณีย์ไกลแค่ไหน?"},{"sp":"B","zh":"不太远，大概七八百米。","py":"Bú tài yuǎn, dàgài qī bā bǎi mǐ.","th":"ไม่ไกลมาก ประมาณเจ็ดแปดร้อยเมตร"}],"vocab":[{"zh":"怎么","py":"zěnme","type":"代","en":"how; why","th":"อย่างไร; ทำไม"},{"zh":"走","py":"zǒu","type":"动","en":"to walk, to go","th":"เดิน; ไป"},{"zh":"一直","py":"yīzhí","type":"副","en":"straight, all the way","th":"ตรงไป"},{"zh":"路口","py":"lùkǒu","type":"名","en":"intersection","th":"ทางแยก"},{"zh":"往","py":"wǎng","type":"介","en":"towards","th":"ไปทาง"},{"zh":"左","py":"zuǒ","type":"名","en":"left","th":"ซ้าย"},{"zh":"右","py":"yòu","type":"名","en":"right","th":"ขวา"},{"zh":"拐","py":"guǎi","type":"动","en":"to turn","th":"เลี้ยว"},{"zh":"大概","py":"dàgài","type":"副","en":"approximately","th":"ประมาณ"},{"zh":"从","py":"cóng","type":"介","en":"from","th":"จาก"},{"zh":"到","py":"dào","type":"介/动","en":"to, until","th":"ถึง"},{"zh":"米","py":"mǐ","type":"量","en":"meter","th":"เมตร"},{"zh":"还是……吧","py":"háishi...ba","type":"","en":"It's better to...","th":"ดีกว่าที่จะ..."}],"grammar":[{"rule":"用多提问","zh":"多 + Adj (多远/多长/多高)","en":"Questions with interrogative pronoun 多","example":"从这儿到邮局有多远？= How far is it from here?","th":"多 + คุณศัพท์ ถามขนาด/ระยะ"},{"rule":"概数","zh":"数 + 多 / 两三 / 七八","en":"Approximate numbers","example":"七八百米 = 700-800 meters; 两三个 = 2-3","th":"ตัวเลขโดยประมาณ: สองตัวเลขติดกัน หรือ ตัวเลข+多"},{"rule":"还是……吧","zh":"还是 + V + 吧","en":"The construction 还是……吧","example":"还是打车去吧。= It's better to take a taxi.","th":"还是...吧 = น่าจะ...ดีกว่า"}]}}}}};

const BKC={hanyu_1a:'#27ae60',hanyu_1b:'#2471a3',speaking:'#e67e22'};
const BKL={hanyu_1a:'1A',hanyu_1b:'1B',speaking:'口语'};
let curBk='hanyu_1a',curLn=1,curView='lesson';
let fcW=[],fcI=0,fcMode='zh2th',fcFlipped=false;
let qMode='c4',qW=[],qI=0,qSc=0,qWr=0;
let idxF='all';
let HW=null,smWord=null;

/* ── PINYIN LOOKUP HELPER ── */
function buildPyMap(){
  const m={};
  Object.values(D.books).forEach(bv=>Object.values(bv.lessons).forEach(lv=>{
    (lv.vocab||lv.words||[]).forEach(w=>{if(w.zh&&w.py)m[w.zh]=w.py;});
  }));
  return m;
}
const PY=buildPyMap();

// Annotate a string: wrap each Chinese word found in PY with ruby notation
// Returns HTML string with <ruby> tags for known words, plain text otherwise
function annotatePy(str){
  if(!str)return '';
  // Replace known vocab (longest match first) with ruby
  let out=str;
  const keys=Object.keys(PY).sort((a,b)=>b.length-a.length);
  // Use placeholder approach to avoid double-replacing
  const holders={};let idx=0;
  for(const k of keys){
    if(out.includes(k)){
      const id='§§'+idx+'§§';
      holders[id]=`<ruby style="ruby-align:center"><rb style="font-family:var(--zh);font-weight:500">${k}</rb><rt style="font-size:.6em;color:var(--gold2);letter-spacing:.02em">${PY[k]}</rt></ruby>`;
      out=out.split(k).join(id);
      idx++;
    }
  }
  // restore
  for(const [id,val] of Object.entries(holders)){out=out.split(id).join(val);}
  return out;
}

/* ── SIDEBAR ── */
function buildSB(){
  const sb=document.getElementById('sb');
  sb.innerHTML='';
  Object.entries(D.books).forEach(([bk,bv])=>{
    sb.insertAdjacentHTML('beforeend',`<div class="sb-bk"><span class="sb-dot" style="background:${BKC[bk]}"></span>${bv.name_th||bv.name_en}</div>`);
    Object.entries(bv.lessons).forEach(([ln,lv])=>{
      const n=parseInt(ln);
      const vc=lv.vocab||lv.words||[];
      const d=document.createElement('div');
      d.className='sbi';d.id=`sb-${bk}-${n}`;
      d.onclick=()=>showLesson(bk,n);
      d.innerHTML=`<div class="sbi-n">${n}</div>
        <div class="sbi-t"><div class="sbi-zh">${lv.title}</div><div class="sbi-en">${lv.title_en}</div></div>
        <div class="sbi-c">${vc.length}</div>`;
      sb.appendChild(d);
    });
  });
}

function setActive(bk,n){
  document.querySelectorAll('.sbi').forEach(e=>e.classList.remove('on'));
  const el=document.getElementById(`sb-${bk}-${n}`);
  if(el){el.classList.add('on');el.scrollIntoView({block:'nearest'});}
  curBk=bk;curLn=n;
  const lv=D.books[bk].lessons[n.toString()];
  fcW=lv?lv.vocab||lv.words||[]:[];
  fcI=0;fcFlipped=false;
}

/* ── LESSON ── */
function showLesson(bk,n){
  setActive(bk,n);
  // Don't hijack quiz/flashcard views when user picks lesson from sidebar
  const stayViews=['quiz','flashcard','grammar','index'];
  if(!stayViews.includes(curView)){
    goView('lesson');
  } else if(curView==='flashcard'){
    updateFC();
  } else if(curView==='quiz'){
    startQuiz();
    return; // startQuiz calls goView itself, skip lesson render below
  }
  const lv=D.books[bk].lessons[n.toString()];
  if(!lv)return;
  const vc=lv.vocab||lv.words||[];
  const col=BKC[bk];
  const spColors=['#c0392b','#2471a3','#8e44ad','#27ae60','#e67e22'];
  const spks=[...new Set((lv.dialogue||[]).map(d=>d.sp||d.speaker||'A'))];
  const spMap={};spks.forEach((s,i)=>{spMap[s]=spColors[i%spColors.length];});

  const dlHTML=lv.dialogue?.length?`
    <div class="sec"><span>💬</span>บทสนทนา</div>
    <div class="dlg">${lv.dialogue.map(d=>{
      const sp=d.sp||d.speaker||'A';
      const c=spMap[sp]||spColors[0];
      const lb=sp.length<=2?sp:sp.slice(0,2);
      return `<div class="dl">
        <div class="dl-sp" style="background:${c}">${lb}</div>
        <div>
          <div class="dl-zh">${d.zh}</div>
          ${d.py?`<div class="dl-py">${d.py}</div>`:''}
          ${d.th?`<div class="dl-th">${d.th}</div>`:''}
        </div></div>`;}).join('')}
    </div>`:''

  const ksHTML=lv.key_sentences?.length?`
    <div class="sec"><span>⭐</span>ประโยคสำคัญ</div>
    ${lv.key_sentences.map(s=>`<div class="ks">${s}</div>`).join('')}`:'';

  const grHTML=lv.grammar?.length?`
    <div class="sec"><span>📐</span>ไวยากรณ์</div>
    ${lv.grammar.map(g=>`
      <div class="gc">
        <div class="gc-h"><span class="gc-tag">${g.rule}</span><span class="gc-ttl">${g.zh}</span></div>
        <div class="gc-b">
          <div class="gc-pat">${g.zh}</div>
          <div class="gc-exp">${g.en}</div>
          <div class="gc-ex">
            <div class="gc-ex-zh">${annotatePy((g.example||'').split('=')[0]?.trim())}</div>
            ${g.example?.includes('=')?`<div style="color:var(--muted);font-size:.75rem">${g.example.split('=').slice(1).join('=').trim()}</div>`:''}
            <div class="gc-ex-th">${g.th||''}</div>
          </div>
        </div>
      </div>`).join('')}`:'';

  const vtHTML=vc.length?`
    <div class="sec"><span>📝</span>คำศัพท์ (${vc.length} คำ)</div>
    <div class="vt-w"><table class="vt">
      <thead><tr><th>อักษร</th><th>พินอิน</th><th>ประเภท</th><th>English</th><th>ภาษาไทย</th><th>ขีด</th></tr></thead>
      <tbody>${vc.map(w=>`<tr>
        <td><span class="vt-zh">${w.zh}</span></td>
        <td><span class="vt-py">${w.py}</span></td>
        <td>${w.type?`<span class="vt-type">${w.type}</span>`:''}</td>
        <td>${w.en}</td>
        <td><span class="vt-th">${w.th}</span></td>
        <td><button class="stroke-btn" onclick='openStroke(${JSON.stringify(w)})'>🖊</button></td>
      </tr>`).join('')}</tbody>
    </table></div>`:'';

  document.getElementById('lc').innerHTML=`
    <div class="lh">
      <div class="lh-c" style="background:linear-gradient(135deg,${col},${col}bb)">${n}</div>
      <div>
        <div class="lh-zh">第${n}课 · ${lv.title}</div>
        <div class="lh-en">Lesson ${n} · ${lv.title_en}</div>
        <div style="font-size:.68rem;color:var(--muted);margin-top:3px">${D.books[bk].name_en}</div>
      </div>
      <div class="lh-btns">
        <button class="btn btn-r" onclick="goView('flashcard')">🃏 Flashcard</button>
        <button class="btn btn-g" onclick="startQuiz()">✏️ ทดสอบ</button>
        <button class="btn btn-p" onclick="printSheet('${bk}',${n})">🖨️ พิมพ์ตารางคัด</button>
      </div>
    </div>
    ${dlHTML}${ksHTML}${grHTML}${vtHTML}`;
}

/* ── PRINT SHEET ── */
function printSheet(bk,n){
  const lv=D.books[bk].lessons[n.toString()];
  if(!lv)return;
  const vc=lv.vocab||lv.words||[];
  const col=BKC[bk];
  const CELLS=14; // cells per row — reduced for A4 fit

  const rows=vc.map((w,wi)=>{
    const chars=[...w.zh];
    // row1 = model chars + rest empty
    const r1=Array.from({length:CELLS},(_,i)=>{
      const isM=i<chars.length;
      return `<div class="psc${isM?' model':''}">
        ${isM?`<div class="ps-mc">${chars[i]}</div>`:''}
        ${i===0&&!isM?'<div class="ps-rl">ตาม</div>':''}
      </div>`;
    }).join('');
    // row2 = all empty
    const r2=Array.from({length:CELLS},(_,i)=>
      `<div class="psc">${i===0?'<div class="ps-rl">เอง</div>':''}</div>`
    ).join('');
    return `<div class="ps-word">
      <div class="ps-meta">
        <span class="ps-zh">${w.zh}</span>
        <span class="ps-py">${w.py}</span>
        ${w.type?`<span class="vt-type" style="font-size:6pt">${w.type}</span>`:''}
        <span class="ps-en">${w.en}</span>
        <span class="ps-th">· ${w.th}</span>
      </div>
      <div class="ps-grid">${r1}</div>
      <div class="ps-grid" style="margin-top:1pt;border-top:0.5pt dashed #bbb">${r2}</div>
    </div>
    ${wi<vc.length-1?'<div class="ps-divider"></div>':''}`;
  }).join('');

  document.getElementById('psheet').innerHTML=`
    <div class="ps-lesson">
      <div class="ps-hdr" style="background:${col};-webkit-print-color-adjust:exact;print-color-adjust:exact">
        <div>
          <div class="ps-h-zh">第${n}课 · ${lv.title}</div>
          <div style="font-size:7pt;color:rgba(255,255,255,.8)">${lv.title_en} · ${D.books[bk].name}</div>
        </div>
        <div class="ps-h-info">${vc.length} คำศัพท์<br>แถวบน=ตามแบบ · แถวล่าง=ฝึกเอง</div>
      </div>
      ${rows}
    </div>`;
  window.print();
}

/* ── FLASHCARD ── */
function updateFC(){
  if(!fcW.length){
    document.getElementById('fcFt').textContent='ไม่มีคำศัพท์';return;
  }
  const w=fcW[fcI];
  const card=document.getElementById('fcCard');
  // Reset to front
  card.classList.remove('flipped');
  fcFlipped=false;

  const lv=D.books[curBk].lessons[curLn.toString()];
  document.getElementById('fcName').textContent=`บทที่ ${curLn} · ${lv?lv.title:''}`;

  let front='';
  if(fcMode==='zh2th')front=w.zh;
  else if(fcMode==='th2zh')front=w.th;
  else if(fcMode==='py2zh')front=w.py;
  else front=w.zh;

  document.getElementById('fcFt').textContent=front;
  document.getElementById('fcPy').textContent=w.py;
  document.getElementById('fcTyp').textContent=w.type?`(${w.type})`:'';
  document.getElementById('fcEn').textContent=w.en;
  document.getElementById('fcTh').textContent=w.th;
  document.getElementById('fcCnt').textContent=`${fcI+1}/${fcW.length}`;
  buildDots();
}

function buildDots(){
  const r=document.getElementById('fcDots');r.innerHTML='';
  fcW.forEach((_,i)=>{
    const d=document.createElement('div');
    d.className='fcd'+(i<fcI?' seen':'')+(i===fcI?' cur':'');
    d.onclick=()=>{fcI=i;updateFC();};
    r.appendChild(d);
  });
}

function flipFC(){
  document.getElementById('fcCard').classList.toggle('flipped');
  fcFlipped=!fcFlipped;
}

function fcNext(){
  if(fcI<fcW.length-1){fcI++;updateFC();}
  else{
    // advance to next lesson
    let found=false;
    for(const [bk,bv] of Object.entries(D.books)){
      for(const ln of Object.keys(bv.lessons).map(Number).sort((a,b)=>a-b)){
        if(found){showLesson(bk,ln);goView('flashcard');return;}
        if(bk===curBk&&ln===curLn)found=true;
      }
    }
    fcI=0;updateFC();
  }
}

function fcPrev(){
  if(fcI>0){fcI--;updateFC();}
  else{
    let prev=null;
    for(const [bk,bv] of Object.entries(D.books)){
      for(const ln of Object.keys(bv.lessons).map(Number).sort((a,b)=>a-b)){
        if(bk===curBk&&ln===curLn){
          if(prev){showLesson(prev.bk,prev.ln);goView('flashcard');}
          return;
        }
        prev={bk,ln};
      }
    }
    fcI=fcW.length-1;updateFC();
  }
}

// Wire up buttons and modes
document.getElementById('fcCard').onclick=flipFC;
document.getElementById('fcNext').onclick=fcNext;
document.getElementById('fcPrev').onclick=fcPrev;
document.querySelectorAll('.fcm').forEach(b=>{
  b.onclick=()=>{
    fcMode=b.dataset.mode;
    document.querySelectorAll('.fcm').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
    fcI=0;updateFC();
  };
});

/* ── QUIZ ── */
function startQuiz(){
  goView('quiz');
  qSc=0;qWr=0;qI=0;
  qW=[...fcW].sort(()=>Math.random()-.5);
  const lv=D.books[curBk].lessons[curLn.toString()];
  document.getElementById('qSub').textContent=`บทที่ ${curLn} · ${lv?.title||''} · ${qW.length} คำ`;
  document.getElementById('qStat').style.display='flex';
  renderQ();
}

document.querySelectorAll('.qmode').forEach(b=>{
  b.onclick=()=>{
    qMode=b.dataset.qm;
    document.querySelectorAll('.qmode').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
    if(qW.length){qI=0;qSc=0;qWr=0;renderQ();}
  };
});

function allVocab(){
  const a=[];
  Object.values(D.books).forEach(bv=>Object.values(bv.lessons).forEach(lv=>{
    (lv.vocab||lv.words||[]).forEach(w=>a.push(w));
  }));
  return a;
}

function renderQ(){
  if(!qW.length){document.getElementById('qArea').innerHTML='<p style="padding:16px;color:var(--muted)">เลือกบทก่อนแล้วกด ✏️ ทดสอบ</p>';return;}
  updQStat();
  if(qI>=qW.length){showQEnd();return;}
  const w=qW[qI];
  const area=document.getElementById('qArea');

  if(qMode==='c4'){
    const wrongs=allVocab().filter(x=>x.zh!==w.zh).sort(()=>Math.random()-.5).slice(0,3);
    const opts=[w,...wrongs].sort(()=>Math.random()-.5);
    area.innerHTML=`<div class="qcard">
      <div class="q-zh">${w.zh}</div>
      <div class="q-py">${w.py}</div>
      <div class="q-opts">${opts.map(o=>`
        <button class="qopt" data-val="${o.zh}">
          ${o.th}<br><small style="color:var(--muted);font-size:.68rem">${o.en}</small>
        </button>`).join('')}</div>
      <div id="qr" class="qres" style="display:none"></div>
    </div>`;
    document.querySelectorAll('.qopt').forEach(b=>{
      b.onclick=()=>checkC4(b.dataset.val,w.zh,w.th);
    });

  }else if(qMode==='fill'){
    area.innerHTML=`<div class="qcard">
      <div style="text-align:center;color:var(--muted);font-size:.8rem;margin-bottom:8px">พิมพ์คำจีน</div>
      <div class="q-zh" style="font-size:1.2rem;color:var(--muted)">${w.th}</div>
      <div class="q-py" style="color:var(--muted)">${w.en}</div>
      <input class="q-fill" id="qFill" placeholder="พิมพ์ที่นี่..." autofocus>
      <button class="qbtn" id="qSub2">ตรวจ ✓</button>
      <div id="qr" class="qres" style="display:none"></div>
    </div>`;
    const go=()=>checkFill(w.zh,w.py);
    document.getElementById('qSub2').onclick=go;
    document.getElementById('qFill').addEventListener('keypress',e=>{if(e.key==='Enter')go();});

  }else{
    const lv=D.books[curBk].lessons[curLn.toString()];
    if(!lv?.dialogue?.length){qMode='c4';document.querySelector('.qmode[data-qm="c4"]').click();return;}
    const di=qI%lv.dialogue.length;
    const dl=lv.dialogue[di];
    const wrongs=allVocab().filter(x=>x.th!==dl.th).sort(()=>Math.random()-.5).slice(0,3);
    const opts=[{zh:dl.zh,th:dl.th},...wrongs].sort(()=>Math.random()-.5);
    area.innerHTML=`<div class="qcard">
      <div style="text-align:center;color:var(--muted);font-size:.75rem;margin-bottom:8px">ความหมายของประโยคนี้?</div>
      <div class="q-zh" style="font-size:1.2rem">${dl.zh}</div>
      <div class="q-py">${dl.py||''}</div>
      <div class="q-opts">${opts.map(o=>`<button class="qopt" data-th="${o.th}">${o.th}</button>`).join('')}</div>
      <div id="qr" class="qres" style="display:none"></div>
    </div>`;
    document.querySelectorAll('.qopt').forEach(b=>{
      b.onclick=()=>checkDL(b.dataset.th,dl.th);
    });
  }
}

function checkC4(sel,correct,correctTh){
  document.querySelectorAll('.qopt').forEach(b=>{
    b.disabled=true;
    if(b.dataset.val===correct)b.classList.add('ok');
    else if(b.dataset.val===sel&&sel!==correct)b.classList.add('bad');
  });
  const ok=sel===correct;
  if(ok)qSc++;else qWr++;
  showQRes(ok?`✅ ถูกต้อง!`:`❌ ผิด — ${correctTh}`,ok);
}

function checkFill(correct,py){
  const v=(document.getElementById('qFill')?.value||'').trim();
  const ok=v===correct;
  document.getElementById('qFill').disabled=true;
  document.getElementById('qSub2').disabled=true;
  if(ok)qSc++;else qWr++;
  showQRes(ok?'✅ ถูกต้อง!':`❌ คำตอบ: ${correct} (${py})`,ok);
}

function checkDL(sel,correct){
  document.querySelectorAll('.qopt').forEach(b=>{
    b.disabled=true;
    if(b.dataset.th===correct)b.classList.add('ok');
    else if(b.dataset.th===sel&&sel!==correct)b.classList.add('bad');
  });
  const ok=sel===correct;
  if(ok)qSc++;else qWr++;
  showQRes(ok?'✅ ถูกต้อง!':`❌ ผิด`,ok);
}

function showQRes(msg,ok){
  updQStat();qI++;
  const r=document.getElementById('qr');
  r.textContent=msg;r.className=`qres ${ok?'ok':'bad'}`;r.style.display='block';
  const nb=document.createElement('button');
  nb.className='qbtn';nb.style.background='var(--blue)';
  nb.textContent=qI<qW.length?'ข้อถัดไป →':'🎉 ดูผล';
  nb.onclick=renderQ;
  document.querySelector('.qcard').appendChild(nb);
}

function updQStat(){
  document.getElementById('qCur').textContent=Math.min(qI+1,qW.length);
  document.getElementById('qTot').textContent=qW.length;
  document.getElementById('qSc').textContent=qSc;
  document.getElementById('qWr').textContent=qWr;
}

function showQEnd(){
  const pct=Math.round(qSc/qW.length*100);
  document.getElementById('qArea').innerHTML=`
    <div class="qcard" style="text-align:center;padding:32px 20px">
      <div style="font-size:3rem;margin-bottom:14px">${pct>=80?'🎉':'😊'}</div>
      <div style="font-size:1.3rem;font-weight:700">${pct>=80?'ยอดเยี่ยม!':pct>=60?'ดีมาก':'ต้องฝึกเพิ่ม'}</div>
      <div style="color:var(--green);font-weight:700;font-size:1.1rem;margin-top:8px">${qSc}/${qW.length} = ${pct}%</div>
      <div style="display:flex;gap:10px;margin-top:20px;justify-content:center">
        <button class="qbtn" style="max-width:160px" onclick="startQuiz()">🔄 ทำใหม่</button>
        <button class="qbtn blue" style="max-width:160px" onclick="goView('flashcard')">🃏 ทบทวน</button>
      </div>
    </div>`;
}

/* ── GRAMMAR VIEW ── */
function buildGrammar(){
  let h='';
  Object.entries(D.books).forEach(([bk,bv])=>{
    const col=BKC[bk];
    const items=Object.entries(bv.lessons)
      .filter(([,lv])=>lv.grammar?.length)
      .sort((a,b)=>parseInt(a[0])-parseInt(b[0]));
    if(!items.length)return;
    h+=`<div class="gbsec">
      <div class="gblabel">
        <span class="gbtag" style="background:${col}">${bv.name_th||bv.name_en}</span>
        <span style="font-size:.75rem;color:var(--muted)">${bv.name_en}</span>
      </div>`;
    items.forEach(([ln,lv])=>{
      h+=`<div class="glg-grp">
        <div class="glg-h">บทที่ ${ln} · ${lv.title} · ${lv.title_en}</div>
        <div class="ggrid">${lv.grammar.map(g=>`
          <div class="gm">
            <div class="gm-h">${g.rule}</div>
            <div class="gm-b">
              <div class="gm-pat">${g.zh}</div>
              <div class="gm-ex">
                <div>${annotatePy((g.example||'').split('=')[0]?.trim())}</div>
                ${g.example?.includes('=')?`<div style="color:var(--muted);font-size:.7rem">= ${g.example.split('=').slice(1).join('=').trim()}</div>`:''}
                <div style="color:var(--blue);font-size:.7rem;margin-top:2px">${g.th||''}</div>
              </div>
            </div>
          </div>`).join('')}
        </div>
      </div>`;
    });
    h+='</div>';
  });
  document.getElementById('gc').innerHTML=h;
}

/* ── INDEX ── */
function buildIndex(){
  const all=[];
  Object.entries(D.books).forEach(([bk,bv])=>{
    Object.entries(bv.lessons).forEach(([ln,lv])=>{
      (lv.vocab||lv.words||[]).forEach(w=>all.push({...w,ln:parseInt(ln),bk}));
    });
  });
  document.getElementById('ivSub').textContent=`${all.length} คำ · ทุกเล่ม`;
  const g=document.getElementById('ig');g.innerHTML='';
  all.forEach(e=>{
    const d=document.createElement('div');
    d.className='ie';
    d.dataset.q=(e.zh+e.py+e.th+e.en).toLowerCase();
    d.dataset.bk=e.bk;
    d.onclick=()=>showLesson(e.bk,e.ln);
    d.innerHTML=`<div class="ie-zh">${e.zh}</div>
      <div class="ie-info">
        <div class="ie-py">${e.py}${e.type?' · '+e.type:''}</div>
        <div class="ie-th">${e.th}</div>
      </div>
      <div class="ie-tag" style="background:${BKC[e.bk]}">${BKL[e.bk]}${e.ln}</div>`;
    g.appendChild(d);
  });
}

document.getElementById('iQ').oninput=()=>{
  const q=document.getElementById('iQ').value.toLowerCase().trim();
  document.querySelectorAll('.ie').forEach(el=>{
    el.style.display=(idxF==='all'||el.dataset.bk===idxF)&&(!q||el.dataset.q.includes(q))?'':'none';

document.querySelectorAll('.idf').forEach(b=>{
  b.onclick=()=>{
    idxF=b.dataset.f;
    document.querySelectorAll('.idf').forEach(x=>x.classList.remove('on'));

});

/* ── STROKE ORDER ── */
function openStroke(w){
  if(typeof w==='string')w=JSON.parse(w);
  smWord=w;
  document.getElementById('smC').textContent=w.zh;
  document.getElementById('smP').textContent=w.py;
  document.getElementById('smT').textContent=w.th;
  document.getElementById('smMsg').textContent='';
  document.getElementById('smodal').style.display='flex';
  initHW(w.zh[0]);
}

function initHW(char){
  // Clear SVG
  const svg=document.getElementById('sm-svg');
  svg.innerHTML='';
  HW=null;
  if(typeof HanziWriter==='undefined'){
    svg.innerHTML=`<text x="90" y="130" text-anchor="middle" font-family="Noto Serif SC,serif" font-size="110" fill="#1c1814">${char}</text>`;
    document.getElementById('smMsg').textContent='⚠️ ไม่สามารถโหลด HanziWriter ได้';
    return;
  }
  try{
    HW=HanziWriter.create('sm-svg',char,{
      width:180,height:180,padding:18,
      strokeColor:'#1c1814',
      radicalColor:'#c0392b',
      outlineColor:'#ddd',
      showCharacter:true,
      showOutline:true,
      strokeAnimationSpeed:1,
      delayBetweenStrokes:300,
      onLoadCharDataSuccess:()=>{
        document.getElementById('smMsg').textContent='โหลดสำเร็จ ✓ กดปุ่มเพื่อเริ่ม';
      },
      onLoadCharDataError:()=>{
        document.getElementById('smMsg').textContent='⚠️ ไม่พบข้อมูลลำดับขีดของตัวอักษรนี้';
      }
    });
  }catch(e){
    svg.innerHTML=`<text x="90" y="130" text-anchor="middle" font-family="Noto Serif SC,serif" font-size="110" fill="#1c1814">${char}</text>`;
    document.getElementById('smMsg').textContent='⚠️ '+e.message;
  }
}

document.getElementById('smAnim').onclick=()=>{
  if(!HW){document.getElementById('smMsg').textContent='กรุณารอโหลดก่อน';return;}
  document.getElementById('smMsg').textContent='กำลังแสดง...';
  HW.animateCharacter({
    onComplete:()=>{document.getElementById('smMsg').textContent='✓ เสร็จแล้ว';}
  });
};

document.getElementById('smQuiz').onclick=()=>{
  if(!HW){document.getElementById('smMsg').textContent='กรุณารอโหลดก่อน';return;}
  document.getElementById('smMsg').textContent='✏️ ลากเขียนตามลำดับขีด';
  HW.quiz({
    onMistake:()=>{document.getElementById('smMsg').textContent='❌ ลองใหม่';},
    onCorrectStroke:()=>{document.getElementById('smMsg').textContent='✓ ถูก! ขีดต่อไป';},
    onComplete:()=>{document.getElementById('smMsg').textContent='🎉 เยี่ยม! ถูกต้องทุกขีด';}
  });
};

document.getElementById('smReset').onclick=()=>{
  if(smWord)initHW(smWord.zh[0]);
};

function closeStroke(){
  document.getElementById('smodal').style.display='none';
  HW=null;
}
document.getElementById('smodal').onclick=e=>{
  if(e.target===document.getElementById('smodal'))closeStroke();
};

/* ── VIEW SWITCHING ── */
function goView(v){
  curView=v;
  document.querySelectorAll('.view').forEach(e=>e.classList.remove('on'));
  document.getElementById('view-'+v).classList.add('on');
  document.querySelectorAll('.ntab').forEach(b=>{
    b.classList.toggle('on',b.dataset.view===v);
  });
  if(v==='flashcard')updateFC();
}
document.querySelectorAll('.ntab').forEach(b=>{
  b.onclick=()=>goView(b.dataset.view);
});

/* ── KEYBOARD ── */
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT')return;
  if(curView==='flashcard'){
    if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();fcNext();}
    else if(e.key==='ArrowLeft')fcPrev();
    else if(e.key==='ArrowUp'||e.key==='Enter'){e.preventDefault();flipFC();}
  }
  if(e.key==='Escape')closeStroke();
});

/* ── SWIPE ── */
let tx=0,ty=0;
document.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
document.addEventListener('touchend',e=>{
  if(curView!=='flashcard')return;
  const dx=e.changedTouches[0].clientX-tx;
  const dy=e.changedTouches[0].clientY-ty;
  // Ignore swipes that are more vertical than horizontal, or start from sidebar zone
  if(Math.abs(dy)>Math.abs(dx))return;
  if(tx<30)return; // left edge - avoid conflict with sidebar swipe
  if(Math.abs(dx)>55){dx<0?fcNext():fcPrev();}
},{passive:true});

/* ── MOBILE SIDEBAR TOGGLE ── */
(function(){
  const btn=document.getElementById('menuBtn');
  const sb=document.getElementById('sb');
  const ov=document.getElementById('sbOverlay');
  let sbOpen=false;
  function openSB(){
    sbOpen=true;
    sb.classList.add('open');
    ov.classList.add('open');
    // Do NOT set body overflow - it breaks scrolling and button presses
  }
  function closeSB(){
    sbOpen=false;
    sb.classList.remove('open');
    ov.classList.remove('open');
  }
  btn.addEventListener('click',function(e){e.stopPropagation();openSB();});
  ov.addEventListener('click',closeSB);
  // Close sidebar when a lesson item is tapped on mobile
  sb.addEventListener('click',function(e){
    if(window.innerWidth<=700 && e.target.closest('.sbi')){
      setTimeout(closeSB,180); // slight delay so lesson loads first
    }
  });
  // Close on Escape
  document.addEventListener('keydown',function(e){
    if(e.key==='Escape'&&sbOpen)closeSB();
  });
})();

/* ── INIT ── */
buildSB();
buildGrammar();
buildIndex();
showLesson('hanyu_1a',1);
</script>
